<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VT Protocol Dashboard</title>
<script src="https://unpkg.com/cytoscape@3.28.1/dist/cytoscape.min.js"></script>
<style>
/* ===== DESIGN TOKENS ===== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root {
  /* Fonts */
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Cascadia Code', monospace;
  /* Spacing & radius */
  --radius: 8px;
  --radius-sm: 4px;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-6: 24px; --space-8: 32px;
  /* Density */
  --row-h: 48px;
}
/* Light theme (default) */
body, body.light {
  --bg: #ffffff;
  --bg-card: #f8f9fa;
  --bg-surface: #f0f1f3;
  --border: #e2e4e8;
  --border-focus: #c8ccd4;
  --red: #dc2626;
  --amber: #d97706;
  --green: #059669;
  --indigo: #4f46e5;
  --indigo-dim: rgba(79,70,229,0.08);
  --cat-cyan: #0891b2;
  --cat-orange: #ea580c;
  --cat-pink: #db2777;
  --text: #1a1a2e;
  --text-muted: #6b7280;
  --text-dim: #9ca3af;
  --link-hover: #3730a3;
  --selection-bg: rgba(79,70,229,0.2);
  --overlay-bg: rgba(0,0,0,0.3);
  --shadow: rgba(0,0,0,0.08);
}
/* Dark theme */
body.dark {
  --bg: #08080C;
  --bg-card: #12121A;
  --bg-surface: #1a1a26;
  --border: #1F1F2E;
  --border-focus: #3a3a50;
  --red: #F87171;
  --amber: #FBBF24;
  --green: #34D399;
  --indigo: #818CF8;
  --indigo-dim: rgba(129,140,248,0.08);
  --cat-cyan: #22d3ee;
  --cat-orange: #fb923c;
  --cat-pink: #f472b6;
  --text: #e4e4ef;
  --text-muted: #8888a0;
  --text-dim: #555568;
  --link-hover: #a5b4fc;
  --selection-bg: rgba(129,140,248,0.3);
  --overlay-bg: rgba(0,0,0,0.6);
  --shadow: rgba(0,0,0,0.3);
}
body.high-density { --row-h: 32px; --space-4: 10px; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; line-height: 1.5; }
a { color: var(--indigo); text-decoration: none; }
a:hover { color: var(--link-hover); }
::selection { background: var(--selection-bg); }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* ===== LAYOUT SHELL ===== */
.app { display: flex; height: 100vh; overflow: hidden; }

/* Primary sidebar — 5 workspaces */
.sidebar { width: 200px; background: var(--bg-card); border-right: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; z-index: 10; }
.sidebar-logo { padding: 16px; font-size: 14px; font-weight: 700; color: var(--indigo); letter-spacing: 0.5px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sidebar-logo .sub { color: var(--text-muted); font-weight: 400; font-size: 11px; display: block; margin-top: 2px; }
.sidebar-nav { flex: 1; padding: 8px 0; }
.nav-item { padding: 10px 16px; cursor: pointer; font-size: 13px; color: var(--text-muted); transition: all 0.15s; display: flex; align-items: center; gap: 10px; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg-surface); color: var(--text); }
.nav-item.active { color: var(--indigo); background: var(--indigo-dim); border-left-color: var(--indigo); font-weight: 600; }
.nav-item .icon { width: 18px; text-align: center; font-size: 14px; }
.nav-item .badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }
.sidebar-footer kbd { background: var(--bg-surface); border: 1px solid var(--border); padding: 1px 4px; border-radius: 3px; font-family: var(--mono); font-size: 10px; }

/* Main content area */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-scroll { flex: 1; overflow-y: auto; padding: var(--space-6) var(--space-8); }

/* ===== GOVERNANCE INTERNAL SIDEBAR ===== */
.workspace-with-sidebar { display: flex; height: 100%; overflow: hidden; }
.internal-sidebar { width: 180px; background: var(--bg); border-right: 1px solid var(--border); flex-shrink: 0; padding: 16px 0; overflow-y: auto; }
.internal-nav { padding: 6px 12px; cursor: pointer; font-size: 12px; color: var(--text-muted); border-radius: var(--radius-sm); margin: 2px 8px; transition: all 0.12s; }
.internal-nav:hover { background: var(--bg-surface); color: var(--text); }
.internal-nav.active { background: var(--indigo-dim); color: var(--indigo); font-weight: 600; }
.internal-content { flex: 1; overflow-y: auto; padding: var(--space-6) var(--space-8); }

/* ===== LATTICE SPLIT PANE ===== */
.lattice-layout { display: flex; height: 100%; overflow: hidden; }
.lattice-filters { width: 20%; min-width: 180px; max-width: 260px; background: var(--bg); border-right: 1px solid var(--border); padding: var(--space-4); overflow-y: auto; flex-shrink: 0; }
.lattice-feed { width: 40%; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
.lattice-detail { width: 40%; overflow-y: auto; background: var(--bg-card); }
.lattice-detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-size: 13px; }

/* Filter panel */
.filter-group { margin-bottom: 16px; }
.filter-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; margin-bottom: 6px; }
.filter-select, .filter-input { width: 100%; padding: 6px 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-size: 12px; font-family: var(--font); outline: none; }
.filter-select:focus, .filter-input:focus { border-color: var(--indigo); }

/* Feed rows */
.feed-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; min-height: var(--row-h); }
.feed-row:hover { background: var(--bg-surface); }
.feed-row.active { background: var(--indigo-dim); border-left: 3px solid var(--indigo); }
.feed-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.feed-icon.llm { background: rgba(129,140,248,0.15); color: var(--indigo); }
.feed-icon.tool { background: rgba(52,211,153,0.15); color: var(--green); }
.feed-icon.shell { background: rgba(251,191,36,0.15); color: var(--amber); }
.feed-icon.git { background: rgba(248,113,113,0.15); color: var(--red); }
.feed-icon.file { background: rgba(136,136,160,0.15); color: var(--text-muted); }
.feed-body { flex: 1; min-width: 0; }
.feed-title { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.feed-meta { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
.feed-time { font-size: 10px; color: var(--text-dim); font-family: var(--mono); flex-shrink: 0; }
.feed-severity { font-size: 10px; font-weight: 600; text-transform: uppercase; flex-shrink: 0; }
.feed-severity.critical { color: var(--red); }
.feed-severity.warning { color: var(--amber); }
.feed-severity.info { color: var(--text-dim); }

/* Detail pane tabs */
.detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
.detail-tab { padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.detail-tab:hover { color: var(--text); }
.detail-tab.active { color: var(--indigo); border-bottom-color: var(--indigo); }
.detail-body { padding: var(--space-4); }

/* ===== AXIOM TABS ===== */
.axiom-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 var(--space-8); background: var(--bg-card); }
.axiom-tab { padding: 12px 20px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.axiom-tab:hover { color: var(--text); }
.axiom-tab.active { color: var(--indigo); border-bottom-color: var(--indigo); }
.axiom-tab .count { display: inline-block; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
.axiom-content { flex: 1; overflow-y: auto; padding: var(--space-6) var(--space-8); }

/* ===== CARDS ===== */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); }
.card-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; margin-bottom: 4px; }
.card-value { font-size: 28px; font-weight: 700; font-family: var(--mono); }
.card-value.green { color: var(--green); }
.card-value.red { color: var(--red); }
.card-value.amber { color: var(--amber); }
.card-value.indigo { color: var(--indigo); }
.card-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* Status badges with dual encoding (color + icon) */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
.badge.critical { background: rgba(248,113,113,0.15); color: var(--red); }
.badge.critical::before { content: '\26A0'; }
.badge.warning { background: rgba(251,191,36,0.15); color: var(--amber); }
.badge.warning::before { content: '\25D0'; }
.badge.success { background: rgba(52,211,153,0.15); color: var(--green); }
.badge.success::before { content: '\2713'; }
.badge.info { background: rgba(129,140,248,0.12); color: var(--indigo); }
.badge.neutral { background: rgba(136,136,160,0.1); color: var(--text-muted); }

/* ===== BUTTONS ===== */
.btn { padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text); cursor: pointer; transition: all 0.15s; font-family: var(--font); }
.btn:hover { border-color: var(--indigo); color: var(--indigo); }
.btn.primary { background: var(--indigo); border-color: var(--indigo); color: #fff; }
.btn.primary:hover { background: #6366f1; }
.btn.danger { border-color: var(--red); color: var(--red); }
.btn.danger:hover { background: rgba(248,113,113,0.1); }

/* ===== TABLES ===== */
.table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 14px; background: var(--bg-surface); color: var(--text-dim); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(129,140,248,0.03); }
tr { height: var(--row-h); }

/* ===== CONTRADICTION RESOLUTION CARD ===== */
.contra-full { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; }
.contra-full-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.contra-full-cols { display: grid; grid-template-columns: 1fr 1fr; }
.contra-col { padding: 16px 20px; }
.contra-col:first-child { border-right: 1px solid var(--border); }
.contra-col-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; margin-bottom: 8px; }
.contra-col h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.contra-col .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.contra-col pre { font-family: var(--mono); font-size: 11px; background: var(--bg); padding: 8px; border-radius: var(--radius-sm); overflow-x: auto; line-height: 1.6; }
.contra-rationale { padding: 0 20px 12px; }
.contra-rationale summary { cursor: pointer; font-size: 12px; color: var(--text-muted); font-weight: 600; padding: 8px 0; }
.contra-rationale .text { font-size: 12px; color: var(--text-muted); line-height: 1.6; padding: 4px 0 8px; }
.contra-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; position: sticky; bottom: 0; background: var(--bg-card); }

/* ===== DIMENSION TAGS ===== */
.dim-tag { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin-right: 3px; }

/* ===== SIGNAL INDICATORS ===== */
.signal-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.signal-dot.red { background: var(--red); box-shadow: 0 0 6px rgba(248,113,113,0.4); }
.signal-dot.amber { background: var(--amber); box-shadow: 0 0 6px rgba(251,191,36,0.4); }
.signal-dot.green { background: var(--green); box-shadow: 0 0 6px rgba(52,211,153,0.4); }

/* ===== GRAPH ===== */
.graph-container { width: 100%; height: calc(100vh - 160px); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }

/* ===== AUDIT ===== */
.audit-entry { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 12px; min-height: var(--row-h); }
.audit-entry:last-child { border-bottom: none; }
.audit-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); min-width: 150px; }
.audit-type { font-weight: 600; min-width: 150px; }

/* ===== COMMAND PALETTE ===== */
.cmd-overlay { position: fixed; inset: 0; background: var(--overlay-bg); z-index: 300; display: none; align-items: flex-start; justify-content: center; padding-top: 18vh; backdrop-filter: blur(2px); }
.cmd-overlay.open { display: flex; }
.cmd-box { width: 560px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: 0 20px 60px var(--shadow); }
.cmd-input { width: 100%; padding: 14px 16px; background: transparent; border: none; color: var(--text); font-size: 15px; font-family: var(--font); outline: none; border-bottom: 1px solid var(--border); }
.cmd-input::placeholder { color: var(--text-dim); }
.cmd-hint { padding: 6px 16px; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
.cmd-hint kbd { background: var(--bg-surface); border: 1px solid var(--border); padding: 0 3px; border-radius: 2px; font-family: var(--mono); font-size: 10px; margin: 0 2px; }
.cmd-results { max-height: 340px; overflow-y: auto; }
.cmd-item { padding: 10px 16px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; transition: background 0.08s; }
.cmd-item:hover, .cmd-item.selected { background: var(--indigo-dim); }
.cmd-item .cmd-label { display: flex; align-items: center; gap: 8px; }
.cmd-shortcut { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.cmd-icon { font-size: 14px; width: 20px; text-align: center; }

/* ===== ASSUMPTION CARDS ===== */
.assumption-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); margin-bottom: var(--space-3); }
.assumption-card .header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.assumption-card .question-box { margin: 8px 0; padding: 10px; background: var(--bg); border-left: 3px solid var(--indigo); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.assumption-card .option { padding: 4px 8px; margin: 3px 0; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; transition: background 0.1s; }
.assumption-card .option:hover { background: var(--bg-surface); }
.assumption-card .option.selected { background: var(--green); color: #000; font-weight: 600; }
.assumption-card .evidence { font-family: var(--mono); font-size: 11px; background: var(--bg); padding: 8px; border-radius: var(--radius-sm); overflow-x: auto; margin-top: 6px; }

/* ===== SECTION HEADINGS ===== */
.page-title { font-size: 18px; font-weight: 700; margin-bottom: var(--space-6); }
.section-title { font-size: 14px; font-weight: 600; margin-bottom: var(--space-3); color: var(--text-muted); }

/* ===== PROGRESS BAR ===== */
.progress-bar { height: 8px; background: var(--bg-surface); border-radius: 4px; overflow: hidden; margin-bottom: var(--space-4); }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
.progress-fill.green { background: var(--green); }
.progress-fill.amber { background: var(--amber); }
.progress-fill.red { background: var(--red); }

/* ===== COMPLIANCE FRAMEWORK CARDS ===== */
.fw-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); cursor: pointer; transition: border-color 0.15s; }
.fw-card:hover { border-color: var(--indigo); }
.fw-card.alert { border-color: var(--red); }
.fw-card .fw-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.fw-card .fw-status { font-size: 12px; }

/* ===== AGENT CARDS ===== */
.agent-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); }
.agent-card .agent-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.agent-card .agent-role { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.drift-gauge { height: 6px; background: var(--bg-surface); border-radius: 3px; margin: 8px 0; position: relative; overflow: hidden; }
.drift-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.permission-chip { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 10px; font-weight: 600; margin: 2px; }
.permission-chip.allow { background: rgba(52,211,153,0.15); color: var(--green); }
.permission-chip.block { background: rgba(248,113,113,0.15); color: var(--red); }

/* ===== RESPONSIVE — MOBILE TRIAGE ONLY ===== */
@media (max-width: 768px) {
  .sidebar { width: 56px; }
  .sidebar-logo .sub, .nav-item span:not(.icon), .nav-item .badge, .sidebar-footer { display: none; }
  .sidebar-logo { font-size: 12px; padding: 12px 8px; text-align: center; }
  .nav-item { padding: 12px 0; justify-content: center; border-left: none; border-bottom: 2px solid transparent; }
  .nav-item.active { border-bottom-color: var(--indigo); border-left-color: transparent; }
  .main-scroll { padding: 16px; }
  .cards { grid-template-columns: repeat(2, 1fr); }
  .contra-full-cols { grid-template-columns: 1fr; }
  .contra-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  .lattice-layout { flex-direction: column; }
  .lattice-filters { display: none; }
  .lattice-feed { width: 100%; height: 50%; }
  .lattice-detail { width: 100%; height: 50%; }
  .workspace-with-sidebar .internal-sidebar { display: none; }
  /* Hide non-essential workspaces */
  [data-page="lattice"], [data-page="axiom"], [data-page="alignment"] { display: none !important; }
}

/* ===== HIGH DENSITY TOGGLE ===== */
.density-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); cursor: pointer; }
.density-toggle input { accent-color: var(--indigo); }

/* ===== THEME TOGGLE ===== */
.theme-toggle { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-muted); transition: all 0.15s; flex-shrink: 0; line-height: 1; padding: 0; }
.theme-toggle:hover { border-color: var(--indigo); color: var(--indigo); }
</style>
</head>
<body class="light">
<script>/* Apply saved theme before paint */(function(){var t=localStorage.getItem('vt-theme');if(t==='dark'||t==='light'){document.body.classList.remove('light','dark');document.body.classList.add(t);}})();</script>
<div class="app">
  <!-- PRIMARY SIDEBAR — 5 workspaces -->
  <nav class="sidebar" id="primary-sidebar">
    <div class="sidebar-logo"><span>VT Protocol<span class="sub">Governance</span></span><button class="theme-toggle" id="theme-toggle" title="Toggle theme" onclick="toggleTheme()">&#9788;</button></div>
    <div class="sidebar-nav" id="sidebar-nav">
      <div class="nav-item active" data-page="home"><span class="icon">&#9632;</span> <span>Home</span></div>
      <div class="nav-item" data-page="lattice"><span class="icon">&#9670;</span> <span>Lattice</span></div>
      <div class="nav-item" data-page="axiom"><span class="icon">&#9830;</span> <span>Axiom</span></div>
      <div class="nav-item" data-page="alignment"><span class="icon">&#9733;</span> <span>Alignment</span></div>
      <div class="nav-item" data-page="governance"><span class="icon">&#9881;</span> <span>Governance</span></div>
    </div>
    <div class="sidebar-footer"><kbd>&#8984;K</kbd> Command Palette</div>
  </nav>

  <!-- MAIN CONTENT -->
  <div class="main-area" id="main-area"></div>
</div>

<!-- COMMAND PALETTE -->
<div class="cmd-overlay" id="cmd-overlay">
  <div class="cmd-box">
    <input class="cmd-input" id="cmd-input" placeholder="Type a command, @ agent, # search, or ? help..." autocomplete="off">
    <div class="cmd-hint"><kbd>></kbd> commands <kbd>@</kbd> agents <kbd>#</kbd> search <kbd>?</kbd> help</div>
    <div class="cmd-results" id="cmd-results"></div>
  </div>
</div>

<script>
/* ===== GLOBALS ===== */
const API = '';
let currentWorkspace = 'home';
let currentGovTab = 'agents';
let currentAxiomTab = 'contradictions';
let ws = null;
let selectedTraceId = null;

/* ===== DIMENSION COLORS (categorical only) ===== */
const DIM_COLORS = {
  database:'#22d3ee', auth:'#f472b6', caching:'#fb923c', api_style:'#34D399',
  deployment:'#818CF8', concurrency:'#a78bfa', logging:'#64748b', testing:'#22d3ee',
  error_handling:'#F87171', state_management:'#fb923c', messaging:'#38bdf8', security:'#f472b6'
};
const ACTION_ICONS = { llm_call:'&#9674;', mcp_tool:'&#9881;', shell_command:'&#9002;', git_operation:'&#8646;', file_read:'&#9744;' };
const ACTION_CLASSES = { llm_call:'llm', mcp_tool:'tool', shell_command:'shell', git_operation:'git', file_read:'file' };

/* ===== HELPERS ===== */
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function fmtTime(ts) { if (!ts) return ''; try { return new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}); } catch { return ''; } }
function fmtDate(ts) { if (!ts) return ''; try { return new Date(ts).toLocaleDateString(); } catch { return ''; } }
function dimTag(dim) { const c = DIM_COLORS[dim] || getComputedStyle(document.body).getPropertyValue('--indigo').trim(); return `<span class="dim-tag" style="background:${c}22;color:${c}">${dim}</span>`; }
function severityBadge(sev) {
  const map = { critical:'critical', high:'critical', warning:'warning', medium:'warning', low:'info', info:'info' };
  return `<span class="badge ${map[sev] || 'neutral'}">${sev}</span>`;
}
function statusBadge(status) {
  const map = { healthy:'success', degraded:'warning', critical:'critical', active:'success', superseded:'neutral',
    unresolved:'critical', resolved:'success', deferred:'warning', ignored:'neutral',
    proposed:'warning', validated:'success', rejected:'critical', detected:'info',
    implemented:'success', partial:'warning', not_started:'neutral', diverged:'critical' };
  return `<span class="badge ${map[status] || 'neutral'}">${status}</span>`;
}

/* ===== NAVIGATION ===== */
document.querySelectorAll('#sidebar-nav .nav-item').forEach(item => {
  item.addEventListener('click', () => navTo(item.dataset.page));
});

function navTo(page) {
  document.querySelectorAll('#sidebar-nav .nav-item').forEach(i => i.classList.toggle('active', i.dataset.page === page));
  currentWorkspace = page;
  loadWorkspace(page);
  closeCmdPalette();
}

function loadWorkspace(ws) {
  const area = document.getElementById('main-area');
  switch(ws) {
    case 'home': loadHome(area); break;
    case 'lattice': loadLattice(area); break;
    case 'axiom': loadAxiom(area); break;
    case 'alignment': loadAlignment(area); break;
    case 'governance': loadGovernance(area); break;
  }
}

/* ===================================================================
   HOME — Triage Dashboard
   =================================================================== */
async function loadHome(el) {
  el.innerHTML = `<div class="main-scroll" id="home-scroll">
    <div class="page-title">Home</div>
    <div class="cards" id="home-cards"></div>
    <div class="section-title">Urgent Triage</div>
    <div id="home-triage"></div>
    <div class="section-title" style="margin-top:24px">Golden Signals</div>
    <div class="table-wrap" id="home-signals"></div>
  </div>`;
  try {
    const data = await fetch(API + '/api/home').then(r => r.json());
    renderHomeCards(data.health);
    renderHomeTriage(data.triage);
    renderHomeSignals(data.signals);
  } catch(e) {
    // Fallback to /api/health if /api/home not available
    try {
      const [health, contras] = await Promise.all([
        fetch(API + '/api/health').then(r => r.json()),
        fetch(API + '/api/contradictions').then(r => r.json()),
      ]);
      renderHomeCards({
        coherence_score: health.coherence_score, status: health.status,
        total_decisions: health.total_decisions, active_decisions: health.active_decisions,
        open_contradictions: health.actionable_contradictions,
        highest_drift: {agent:'none', score:0}, anomalous_llm_calls: 0, pending_assumptions: 0
      });
      renderHomeTriage({ total: contras.total, contradictions: contras.contradictions.slice(0, 5) });
      renderHomeSignals([]);
    } catch(e2) { document.getElementById('home-scroll').innerHTML += `<p style="color:var(--red)">Failed to load: ${esc(e2.message)}</p>`; }
  }
}

function renderHomeCards(h) {
  const cards = document.getElementById('home-cards');
  const ccls = h.coherence_score >= 0.8 ? 'green' : h.coherence_score >= 0.5 ? 'amber' : 'red';
  const driftCls = h.highest_drift.score >= 0.7 ? 'red' : h.highest_drift.score >= 0.4 ? 'amber' : 'green';
  cards.innerHTML = `
    <div class="card"><div class="card-label">Coherence</div><div class="card-value ${ccls}">${Math.round(h.coherence_score*100)}%</div><div class="card-sub">${statusBadge(h.status)}</div></div>
    <div class="card"><div class="card-label">Open Critical</div><div class="card-value ${h.open_contradictions ? 'red' : 'green'}">${h.open_contradictions}</div><div class="card-sub">contradictions</div></div>
    <div class="card"><div class="card-label">Highest Drift</div><div class="card-value ${driftCls}" style="font-size:18px">${esc(h.highest_drift.agent)}</div><div class="card-sub">${h.highest_drift.score.toFixed(2)} drift</div></div>
    <div class="card"><div class="card-label">LLM Anomalies</div><div class="card-value ${h.anomalous_llm_calls ? 'amber' : 'green'}">${h.anomalous_llm_calls}</div><div class="card-sub">flagged calls</div></div>
  `;
}

function renderHomeTriage(triage) {
  const el = document.getElementById('home-triage');
  if (!triage.contradictions || !triage.contradictions.length) {
    el.innerHTML = '<div class="card" style="text-align:center;color:var(--green);padding:20px"><span class="badge success">All Clear</span> No unresolved contradictions</div>';
    return;
  }
  el.innerHTML = triage.contradictions.map(c => renderContraCard(c)).join('');
}

function renderContraCard(c) {
  return `<div class="contra-full">
    <div class="contra-full-header">
      ${severityBadge(c.verdict === 'contradiction' ? 'critical' : 'warning')}
      <span style="font-weight:600;flex:1">${esc(c.decision_a_title)} vs ${esc(c.decision_b_title)}</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">${Math.round(c.confidence*100)}% NLI</span>
    </div>
    <div class="contra-full-cols">
      <div class="contra-col">
        <div class="contra-col-label">Decision A</div>
        <h4>${esc(c.decision_a_title)}</h4>
        <div class="meta">${(c.shared_dimensions||[]).map(d => dimTag(d)).join(' ')}</div>
        <pre>${esc(c.evidence_a)}</pre>
      </div>
      <div class="contra-col">
        <div class="contra-col-label">Decision B</div>
        <h4>${esc(c.decision_b_title)}</h4>
        <div class="meta">${(c.shared_dimensions||[]).map(d => dimTag(d)).join(' ')}</div>
        <pre>${esc(c.evidence_b)}</pre>
      </div>
    </div>
    <div class="contra-rationale"><details><summary>View Rationale</summary><div class="text">${esc(c.reasoning)}</div></details></div>
    <div class="contra-footer">
      <button class="btn primary" onclick="resolveContra('${c.id}','${c.decision_a_id}','Accept A')">Accept A</button>
      <button class="btn primary" onclick="resolveContra('${c.id}','${c.decision_b_id}','Accept B')">Accept B</button>
      <button class="btn" onclick="resolveContra('${c.id}','both','Both Stay')">Both Stay</button>
      <button class="btn danger" onclick="resolveContra('${c.id}','exception','Create Exception')">Create Exception</button>
    </div>
  </div>`;
}

function renderHomeSignals(signals) {
  const el = document.getElementById('home-signals');
  if (!signals || !signals.length) {
    el.innerHTML = '<div style="padding:14px;color:var(--text-dim)">No signal data available.</div>';
    return;
  }
  el.innerHTML = signals.map(s => {
    const dotCls = s.status === 'red' ? 'red' : s.status === 'yellow' ? 'amber' : 'green';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)">
      <span class="signal-dot ${dotCls}"></span>
      <span style="flex:1;font-weight:500">${esc(s.signal.replace(/_/g,' '))}</span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--text-muted)">${s.count}</span>
    </div>`;
  }).join('');
}

async function resolveContra(id, winnerId, rationale) {
  try {
    await fetch(API + '/api/contradictions/' + id + '/resolve', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ winner_id: winnerId, rationale })
    });
    loadWorkspace(currentWorkspace);
  } catch(e) { alert('Failed: ' + e.message); }
}

/* ===================================================================
   LATTICE — Unified Observation (Filter + Feed + Detail)
   =================================================================== */
async function loadLattice(el) {
  el.innerHTML = `<div class="lattice-layout">
    <div class="lattice-filters" id="lattice-filters">
      <div style="font-weight:700;font-size:13px;margin-bottom:12px">Filters</div>
      <div class="filter-group"><div class="filter-label">Action Type</div>
        <select class="filter-select" id="lf-action" onchange="applyLatticeFilters()">
          <option value="">All</option><option value="llm_call">LLM Call</option><option value="mcp_tool">MCP Tool</option>
          <option value="shell_command">Shell</option><option value="git_operation">Git</option><option value="file_read">File Read</option>
        </select></div>
      <div class="filter-group"><div class="filter-label">Agent</div>
        <select class="filter-select" id="lf-agent" onchange="applyLatticeFilters()"><option value="">All</option></select></div>
      <div class="filter-group"><div class="filter-label">Severity</div>
        <select class="filter-select" id="lf-severity" onchange="applyLatticeFilters()">
          <option value="">All</option><option value="critical">Critical</option><option value="warning">Warning</option><option value="info">Info</option>
        </select></div>
      <div class="filter-group"><div class="filter-label">Search</div>
        <input class="filter-input" id="lf-search" placeholder="trace id, model..." oninput="applyLatticeFilters()"></div>
      <div class="density-toggle" style="margin-top:12px"><input type="checkbox" id="density-toggle" onchange="document.body.classList.toggle('high-density',this.checked)"> <span>High Density</span></div>
    </div>
    <div class="lattice-feed" id="lattice-feed"><div style="padding:20px;color:var(--text-dim)">Loading traces...</div></div>
    <div class="lattice-detail" id="lattice-detail"><div class="lattice-detail-empty">Select a trace to view details</div></div>
  </div>`;
  try {
    const data = await fetch(API + '/api/traces?limit=200').then(r => r.json());
    window._latticeData = data;
    // Populate agent filter
    const agents = new Set();
    (data.entries || data.spans || []).forEach(e => { if (e.agent_id) agents.add(e.agent_id); });
    const agentSel = document.getElementById('lf-agent');
    agents.forEach(a => { const o = document.createElement('option'); o.value = a; o.text = a; agentSel.add(o); });
    renderLatticeFeed(data.entries || data.spans || []);
  } catch(e) { document.getElementById('lattice-feed').innerHTML = `<div style="padding:20px;color:var(--red)">Failed: ${esc(e.message)}</div>`; }
}

function applyLatticeFilters() {
  if (!window._latticeData) return;
  let entries = window._latticeData.entries || window._latticeData.spans || [];
  const action = document.getElementById('lf-action').value;
  const agent = document.getElementById('lf-agent').value;
  const severity = document.getElementById('lf-severity').value;
  const search = document.getElementById('lf-search').value.toLowerCase();
  if (action) entries = entries.filter(e => e.action_type === action);
  if (agent) entries = entries.filter(e => e.agent_id === agent);
  if (severity) entries = entries.filter(e => e.severity === severity);
  if (search) entries = entries.filter(e => JSON.stringify(e).toLowerCase().includes(search));
  renderLatticeFeed(entries);
}

function renderLatticeFeed(entries) {
  const feed = document.getElementById('lattice-feed');
  if (!entries.length) { feed.innerHTML = '<div style="padding:20px;color:var(--text-dim)">No traces match filters.</div>'; return; }
  feed.innerHTML = entries.map(e => {
    const type = e.action_type || 'llm_call';
    const icon = ACTION_ICONS[type] || '&#9679;';
    const cls = ACTION_CLASSES[type] || 'file';
    const title = e.summary || e.tool_name || e.model || type;
    const isActive = selectedTraceId === (e.entry_id || e.span_id) ? ' active' : '';
    return `<div class="feed-row${isActive}" onclick="selectTrace(this, ${esc("'" + JSON.stringify(e).replace(/'/g, "\\'") + "'")})" data-id="${e.entry_id || e.span_id}">
      <div class="feed-icon ${cls}">${icon}</div>
      <div class="feed-body">
        <div class="feed-title">${esc(title)}</div>
        <div class="feed-meta">${esc(e.agent_id || '')} ${e.duration_ms ? '&middot; ' + e.duration_ms + 'ms' : ''}</div>
      </div>
      <span class="feed-severity ${e.severity || 'info'}">${e.severity || 'info'}</span>
      <span class="feed-time">${fmtTime(e.timestamp)}</span>
    </div>`;
  }).join('');
}

function selectTrace(rowEl, jsonStr) {
  document.querySelectorAll('.feed-row.active').forEach(r => r.classList.remove('active'));
  rowEl.classList.add('active');
  let entry;
  try { entry = JSON.parse(jsonStr); } catch { return; }
  selectedTraceId = entry.entry_id || entry.span_id;
  renderTraceDetail(entry);
}

function renderTraceDetail(e) {
  const det = document.getElementById('lattice-detail');
  const details = e.details || {};
  det.innerHTML = `
    <div class="detail-tabs">
      <div class="detail-tab active" onclick="showDetailTab(this,'trace-tab')">Trace Detail</div>
      <div class="detail-tab" onclick="showDetailTab(this,'prov-tab')">Provenance</div>
    </div>
    <div id="trace-tab" class="detail-body">
      <div style="margin-bottom:12px"><span class="badge info">${esc(e.action_type || 'llm_call')}</span> ${severityBadge(e.severity || 'info')}</div>
      <div style="margin-bottom:8px;font-weight:600;font-size:14px">${esc(e.summary || e.tool_name || '')}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div class="card"><div class="card-label">Agent</div><div style="font-family:var(--mono);font-size:12px">${esc(e.agent_id || 'unknown')}</div></div>
        <div class="card"><div class="card-label">Duration</div><div style="font-family:var(--mono);font-size:12px">${e.duration_ms || 0}ms</div></div>
        ${details.model ? `<div class="card"><div class="card-label">Model</div><div style="font-family:var(--mono);font-size:12px">${esc(details.model)}</div></div>` : ''}
        ${details.provider ? `<div class="card"><div class="card-label">Provider</div><div style="font-family:var(--mono);font-size:12px">${esc(details.provider)}</div></div>` : ''}
        ${details.tokens_in != null ? `<div class="card"><div class="card-label">Tokens In</div><div style="font-family:var(--mono);font-size:12px">${details.tokens_in}</div></div>` : ''}
        ${details.tokens_out != null ? `<div class="card"><div class="card-label">Tokens Out</div><div style="font-family:var(--mono);font-size:12px">${details.tokens_out}</div></div>` : ''}
        ${details.cost_usd != null ? `<div class="card"><div class="card-label">Cost</div><div style="font-family:var(--mono);font-size:12px">$${details.cost_usd.toFixed(4)}</div></div>` : ''}
      </div>
      <div class="section-title">Timestamp</div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--text-muted);margin-bottom:12px">${e.timestamp || ''}</div>
      ${details.command ? `<div class="section-title">Command</div><pre style="font-family:var(--mono);font-size:11px;background:var(--bg);padding:8px;border-radius:4px;margin-bottom:12px;overflow-x:auto">${esc(details.command)}</pre>` : ''}
      ${details.file_path ? `<div class="section-title">File</div><div style="font-family:var(--mono);font-size:12px;color:var(--text-muted);margin-bottom:12px">${esc(details.file_path)}</div>` : ''}
      <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">ID: ${esc(e.entry_id || e.span_id || '')}</div>
    </div>
    <div id="prov-tab" class="detail-body" style="display:none">
      <div style="color:var(--text-dim);padding:20px;text-align:center">Provenance graph for this trace. <br>Run agent sessions to capture causal links.</div>
      <div id="trace-prov-graph" style="height:300px;background:var(--bg);border-radius:var(--radius)"></div>
    </div>
  `;
}

function showDetailTab(tabEl, tabId) {
  tabEl.parentElement.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  tabEl.parentElement.parentElement.querySelectorAll('.detail-body').forEach(b => b.style.display = 'none');
  document.getElementById(tabId).style.display = 'block';
}

/* ===================================================================
   AXIOM — Contradictions + Decision Ledger
   =================================================================== */
async function loadAxiom(el) {
  const contraCount = await fetch(API + '/api/contradictions?status=unresolved').then(r => r.json()).then(d => d.total).catch(() => 0);
  el.innerHTML = `
    <div class="axiom-tabs">
      <div class="axiom-tab active" data-tab="contradictions" onclick="switchAxiomTab(this,'contradictions')">Contradictions ${contraCount ? `<span class="count">${contraCount}</span>` : ''}</div>
      <div class="axiom-tab" data-tab="ledger" onclick="switchAxiomTab(this,'ledger')">Decision Ledger</div>
    </div>
    <div class="axiom-content" id="axiom-content"></div>
  `;
  currentAxiomTab = 'contradictions';
  loadAxiomContradictions();
}

function switchAxiomTab(tabEl, tab) {
  tabEl.parentElement.querySelectorAll('.axiom-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  currentAxiomTab = tab;
  if (tab === 'contradictions') loadAxiomContradictions();
  else loadAxiomLedger();
}

async function loadAxiomContradictions() {
  const el = document.getElementById('axiom-content');
  el.innerHTML = '<div style="color:var(--text-dim)">Loading...</div>';
  try {
    const data = await fetch(API + '/api/contradictions').then(r => r.json());
    if (!data.contradictions.length) {
      el.innerHTML = '<div class="card" style="text-align:center;padding:24px"><span class="badge success">Clean</span> No unresolved contradictions.</div>';
      return;
    }
    el.innerHTML = data.contradictions.map(c => renderContraCard(c)).join('');
  } catch(e) { el.innerHTML = `<p style="color:var(--red)">Failed: ${esc(e.message)}</p>`; }
}

async function loadAxiomLedger() {
  const el = document.getElementById('axiom-content');
  el.innerHTML = '<div class="section-title">Decision Timeline</div><div class="graph-container" id="ledger-graph"></div>';
  try {
    const data = await fetch(API + '/api/graph').then(r => r.json());
    if (!data.nodes.length) {
      el.innerHTML = '<div class="card" style="text-align:center;padding:24px;color:var(--text-dim)">No decisions recorded yet.</div>';
      return;
    }
    // Swimlane-style: group nodes by agent, plot on time axis
    const elements = [];
    data.nodes.forEach(n => {
      const dim = (n.data.dimensions || [])[0] || 'database';
      elements.push({ data: { ...n.data, color: DIM_COLORS[dim] || '#818CF8' } });
    });
    data.edges.forEach(e => {
      const color = e.data.type === 'CONTRADICTION' ? '#F87171' : e.data.type === 'TENSION' ? '#FBBF24' : e.data.type === 'SUPERSEDES' ? '#8888a0' : '#1F1F2E';
      const style = e.data.type === 'SHARED_DIMENSION' ? 'dotted' : 'solid';
      elements.push({ data: { ...e.data, color, lineStyle: style } });
    });
    const cy = cytoscape({
      container: document.getElementById('ledger-graph'), elements,
      style: [
        { selector: 'node', style: { 'background-color': 'data(color)', 'label': 'data(label)', 'font-size': '10px', 'color': getComputedStyle(document.body).getPropertyValue('--text').trim(), 'text-outline-color': getComputedStyle(document.body).getPropertyValue('--bg').trim(), 'text-outline-width': 2, 'width': 28, 'height': 28, 'font-family': 'Inter, sans-serif' } },
        { selector: 'edge', style: { 'line-color': 'data(color)', 'width': 1.5, 'curve-style': 'bezier', 'target-arrow-shape': 'triangle', 'target-arrow-color': 'data(color)', 'arrow-scale': 0.7 } },
        { selector: 'edge[type="SHARED_DIMENSION"]', style: { 'target-arrow-shape': 'none', 'line-style': 'dotted', 'width': 1, 'opacity': 0.3 } }
      ],
      layout: { name: 'cose', animate: false, nodeDimensionsIncludeLabels: true, idealEdgeLength: 120 }
    });
    cy.on('tap', 'node', e => showDecisionModal(e.target.data('id')));
  } catch(e) { el.innerHTML = `<p style="color:var(--red)">Failed: ${esc(e.message)}</p>`; }
}

async function showDecisionModal(id) {
  try {
    const d = await fetch(API + '/api/decisions/' + id).then(r => r.json());
    const det = document.getElementById('lattice-detail') || document.getElementById('axiom-content');
    // Simple inline display — reuse available space
    alert(`${d.title}\n\nType: ${d.decision_type}\nDimensions: ${d.dimensions.join(', ')}\nConfidence: ${Math.round(d.confidence*100)}%\n\n${d.content}`);
  } catch(e) { console.error(e); }
}

/* ===================================================================
   ALIGNMENT — Living Specs + API Contracts
   =================================================================== */
async function loadAlignment(el) {
  el.innerHTML = `<div class="main-scroll">
    <div class="page-title">Alignment</div>
    <div id="alignment-progress"></div>
    <div class="section-title">Living Specs</div>
    <div id="alignment-specs" class="table-wrap" style="margin-bottom:24px"></div>
    <div class="section-title">API Contracts</div>
    <div id="alignment-contracts"></div>
    <div style="margin-top:16px"><a href="#" onclick="event.preventDefault();loadAlignmentAnalytics()" style="font-size:12px">View Analytics &rarr;</a></div>
  </div>`;
  try {
    const [specs, contracts] = await Promise.all([
      fetch(API + '/api/specs').then(r => r.json()).catch(() => ({ total_specs:0, total_requirements:0, coverage_percent:0, specs:[], coverage_reports:[] })),
      fetch(API + '/api/contracts').then(r => r.json()).catch(() => ({ total_endpoints:0, violation_count:0, consistency_score:1, services:[], violations:[] })),
    ]);
    renderAlignmentProgress(specs);
    renderAlignmentSpecs(specs);
    renderAlignmentContracts(contracts);
  } catch(e) { el.querySelector('.main-scroll').innerHTML += `<p style="color:var(--red)">Failed: ${esc(e.message)}</p>`; }
}

function renderAlignmentProgress(specs) {
  const el = document.getElementById('alignment-progress');
  const pct = specs.coverage_percent || 0;
  const cls = pct >= 80 ? 'green' : pct >= 50 ? 'amber' : 'red';
  el.innerHTML = `

async function filterGovAssumptions() {
  const status = document.getElementById('ga-status').value;

  let url = API + '/api/assumptions?limit=200';
  if (status) url += '&status=' + status;
  if (category) url += '&category=' + category;
  try {
    const data = await fetch(url).then(r => r.json());
    renderGovAssumptionCards(data.stats);
    renderGovAssumptionList(data.assumptions);
  } catch(e) { document.getElementById('gov-assumption-list').innerHTML = `<p style="color:var(--red)">Failed: ${esc(e.message)}</p>`; }

function renderGovAssumptionCards(stats) {
  const el = document.getElementById('gov-assumption-cards');
  if (!stats) { el.innerHTML = ''; return; }
  const bs = stats.by_status || {};
  el.innerHTML = `
    <div class="card"><div class="card-label">Proposed</div><div class="card-value ${bs.proposed ? 'amber' : 'green'}">${bs.proposed || 0}</div><div class="card-sub">needs answer</div></div>

function renderGovAssumptionList(assumptions) {
  const el = document.getElementById('gov-assumption-list');
  if (!assumptions || !assumptions.length) { el.innerHTML = '<div class="card" style="color:var(--text-dim)">No assumptions match filters. Run <code>vt assumptions --scan</code>.</div>'; return; }
  // Sort by severity: critical > high > medium > low
  const sevOrder = { critical: 0, high: 1, medium: 2, low: 3 };
  assumptions.sort((a, b) => (sevOrder[a.severity] || 3) - (sevOrder[b.severity] || 3));
  el.innerHTML = assumptions.map(a => {
    const evidence = a.code_evidence && a.code_evidence.length ? a.code_evidence[0] : null;
    const options = (a.options || []).map((opt, i) => {
      const sel = a.selected_option === i ? 'selected' : '';
      return `<div class="option ${sel}" onclick="resolveAssumption('${a.id}', ${i})">${esc(opt)}</div>`;
    }).join('');
    return `<div class="assumption-card">
      <div class="header">
        ${statusBadge(a.status)} ${severityBadge(a.severity)}
        <span style="font-size:11px;color:var(--text-dim)">${esc(a.category)} / ${esc(a.pattern_id)}</span>
        <span style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text-dim)">${Math.round((a.confidence||0)*100)}%</span>
      </div>
      <div style="font-weight:600;margin-bottom:6px">${esc(a.summary)}</div>
      ${a.question ? `<div class="question-box"><div style="font-weight:600;margin-bottom:6px">${esc(a.question)}</div>${options}</div>` : ''}
      ${evidence ? `<div style="font-size:11px;color:var(--text-dim);margin-top:4px">${esc(evidence.file)}:${evidence.line}</div>` : ''}
      ${evidence && evidence.snippet ? `<div class="evidence">${esc(evidence.snippet)}</div>` : ''}
      ${a.detected_by ? `<div style="font-size:10px;color:var(--text-dim);margin-top:4px">detected by ${esc(a.detected_by)}</div>` : ''}
    </div>`;
  }).join('');
}

];

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); toggleCmdPalette(); }
  if (e.key === 'Escape') closeCmdPalette();
});

function toggleCmdPalette() {
  const overlay = document.getElementById('cmd-overlay');
  overlay.classList.toggle('open');
  if (overlay.classList.contains('open')) {
    const input = document.getElementById('cmd-input');
    input.value = ''; input.focus();
    filterCmdPalette('');
  }
}
function closeCmdPalette() { document.getElementById('cmd-overlay').classList.remove('open'); }

document.getElementById('cmd-input').addEventListener('input', e => filterCmdPalette(e.target.value));
document.getElementById('cmd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const sel = document.querySelector('.cmd-item.selected') || document.querySelector('.cmd-item');
    if (sel) sel.click();
  }
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const items = [...document.querySelectorAll('.cmd-item')];
    const idx = items.findIndex(i => i.classList.contains('selected'));
    items.forEach(i => i.classList.remove('selected'));
    const next = e.key === 'ArrowDown' ? Math.min(idx + 1, items.length - 1) : Math.max(idx - 1, 0);
    if (items[next]) { items[next].classList.add('selected'); items[next].scrollIntoView({ block: 'nearest' }); }
  }
});
document.getElementById('cmd-overlay').addEventListener('click', e => { if (e.target.id === 'cmd-overlay') closeCmdPalette(); });

function filterCmdPalette(query) {
  const q = query.toLowerCase().trim();
  const results = document.getElementById('cmd-results');
  let items = [];

  if (q.startsWith('>') || !q.startsWith('@') && !q.startsWith('#') && !q.startsWith('?')) {
    // Command mode
    const search = q.startsWith('>') ? q.slice(1).trim() : q;
    items = cmdCommands.filter(c => c.label.toLowerCase().includes(search));
  } else if (q.startsWith('@')) {
    // Agent targeting
    const search = q.slice(1).trim();
    items = [
      { label: '@claude-backend', icon: '&#9881;', action: () => { closeCmdPalette(); navTo('lattice'); setTimeout(() => { const sel = document.getElementById('lf-agent'); if(sel) { sel.value='claude-backend'; applyLatticeFilters(); }}, 200); } },
      { label: '@cursor-frontend', icon: '&#9881;', action: () => { closeCmdPalette(); navTo('lattice'); setTimeout(() => { const sel = document.getElementById('lf-agent'); if(sel) { sel.value='cursor-frontend'; applyLatticeFilters(); }}, 200); } },
    ].filter(c => c.label.toLowerCase().includes(search));
  } else if (q.startsWith('#')) {
    // Search mode
    items = [{ label: 'Search: ' + q.slice(1), icon: '&#128270;', action: () => { closeCmdPalette(); navTo('lattice'); setTimeout(() => { const inp = document.getElementById('lf-search'); if(inp) { inp.value = q.slice(1); applyLatticeFilters(); }}, 200); } }];
  } else if (q.startsWith('?')) {
    // Help mode
    items = [
      { label: 'Lyapunov drift measures agent trajectory divergence from expected behavior', icon: '?', action: () => closeCmdPalette() },
      { label: 'NLI score is the Natural Language Inference confidence of a contradiction', icon: '?', action: () => closeCmdPalette() },
      { label: 'Coherence = 1 - (actionable_contradictions / total_decisions)', icon: '?', action: () => closeCmdPalette() },
    ].filter(c => c.label.toLowerCase().includes(q.slice(1).trim()));
  }

  if (!items.length) {
    results.innerHTML = '<div style="padding:16px;color:var(--text-dim);text-align:center">No results</div>';
    return;
  }
  results.innerHTML = items.map((c, i) => `
    <div class="cmd-item${i === 0 ? ' selected' : ''}" onclick="(function(){${c.action.toString().slice(c.action.toString().indexOf('{') + 1, -1)}})();closeCmdPalette()">
      <span class="cmd-label"><span class="cmd-icon">${c.icon || ''}</span> ${esc(c.label)}</span>
    </div>
  `).join('');
}

/* ===================================================================
   WEBSOCKET
   =================================================================== */
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + location.host + '/ws');
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'contradiction_resolved' || msg.type === 'decision_added') {
        loadWorkspace(currentWorkspace);
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => {};
}

/* ===================================================================
   THEME TOGGLE
   =================================================================== */
function toggleTheme() {
  const isDark = document.body.classList.contains('dark');
  const next = isDark ? 'light' : 'dark';
  document.body.classList.remove('light', 'dark');
  document.body.classList.add(next);
  localStorage.setItem('vt-theme', next);
  updateThemeIcon();
}

function updateThemeIcon() {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  btn.innerHTML = document.body.classList.contains('dark') ? '\u263E' : '\u2600';
  btn.title = document.body.classList.contains('dark') ? 'Switch to light mode' : 'Switch to dark mode';
}
updateThemeIcon();

/* ===================================================================
   PERSONA-BASED ROUTING (on init)
   =================================================================== */
async function initDashboard() {
  // Try to load persona config
  let landing = 'home';
  try {
    const persona = localStorage.getItem('vt-persona');
    if (persona) {
      const routing = {
        'tech-lead': 'home', 'ciso': 'governance', 'pm': 'alignment', 'qa': 'alignment'
      };
      landing = routing[persona] || 'home';
    } else {
      const data = await fetch(API + '/api/persona').then(r => r.json()).catch(() => null);
      if (data && data.routing) {
        landing = data.routing.landing || 'home';
        localStorage.setItem('vt-persona', data.persona);
      }
    }
  } catch {}
  navTo(landing);
  try { connectWS(); } catch {}

  // Update contradiction badge
  try {
    const data = await fetch(API + '/api/contradictions?status=unresolved').then(r => r.json());
    if (data.total > 0) {
      const axiomNav = document.querySelector('[data-page="axiom"]');
      if (axiomNav && !axiomNav.querySelector('.badge')) {
        axiomNav.innerHTML += ` <span class="badge" style="margin-left:auto;background:var(--red);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px">${data.total}</span>`;
      }
    }
  } catch {}
}

initDashboard();
</script>
