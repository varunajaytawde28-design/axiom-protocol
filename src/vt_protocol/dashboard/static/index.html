<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VT Protocol Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<style>
/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ===== DESIGN TOKENS — Light (default) ===== */
:root {
  /* Backgrounds */
  --bg: #f8f9fa;
  --bg-card: #ffffff;
  --bg-surface: #f0f2f7;
  --bg-elevated: #e8ebf4;

  /* Borders */
  --border: #dde1ec;
  --border-focus: #c0c6d8;

  /* Brand — Indigo */
  --indigo: #6d28d9;
  --indigo-dim: rgba(109,40,217,0.08);
  --indigo-glow: rgba(109,40,217,0.2);

  /* Typography */
  --text: #14151f;
  --text-muted: #505672;
  --text-dim: #9ca3af;
  --link-hover: #5b21b6;
  --selection-bg: rgba(109,40,217,0.2);

  /* Semantic states */
  --red: #dc2626;
  --amber: #d97706;
  --green: #059669;
  --cyan: #0891b2;
  --cat-cyan: #0891b2;
  --cat-orange: #ea580c;
  --cat-pink: #db2777;

  /* Misc */
  --overlay-bg: rgba(0,0,0,0.35);
  --shadow: rgba(0,0,0,0.1);

  /* Fonts */
  --font: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'Geist Mono', 'SF Mono', 'Cascadia Code', monospace;

  /* 8pt spacing grid */
  --radius: 8px;
  --radius-sm: 4px;
  --space-1: 4px; --space-2: 8px; --space-3: 12px; --space-4: 16px; --space-6: 24px; --space-8: 32px;

  /* Major Second type scale */
  --text-xs: 12px; --text-sm: 14px; --text-md: 16px; --text-lg: 18px;
  --text-xl: 20px; --text-2xl: 22px; --text-3xl: 32px;

  /* Density */
  --row-h: 48px;
}

/* Dark mode override — theme toggle */
body.dark {
  --bg: #0b0c0f; --bg-card: #16181d; --bg-surface: #1e2028; --bg-elevated: #2a2d35;
  --border: #2a2d35; --border-focus: #3d4050;
  --indigo: #7c3aed; --indigo-dim: rgba(124,58,237,0.1); --indigo-glow: rgba(124,58,237,0.25);
  --text: #f8fafe; --text-muted: #a1a8b8; --text-dim: #6b7280;
  --link-hover: #a78bfa; --selection-bg: rgba(124,58,237,0.25);
  --overlay-bg: rgba(0,0,0,0.75); --shadow: rgba(0,0,0,0.5);
  --red: #ef4444; --amber: #f59e0b; --green: #10b981; --cyan: #06b6d4;
  --cat-cyan: #06b6d4; --cat-orange: #f97316; --cat-pink: #ec4899;
}

/* Light class is the default; no overrides needed */
body.light {}

body.high-density { --row-h: 32px; --space-4: 10px; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

a { color: var(--indigo); text-decoration: none; }
a:hover { color: var(--link-hover); }
::selection { background: var(--selection-bg); }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-focus); }

/* ===== LAYOUT SHELL ===== */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ===== SIDEBAR — fixed 220px ===== */
.sidebar {
  width: 220px;
  background: var(--bg-card);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  z-index: 10;
}
.sidebar-logo {
  padding: 18px 20px;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
}
.sidebar-logo .sub { color: var(--text-dim); font-weight: 400; font-size: 11px; display: block; margin-top: 2px; letter-spacing: 0.3px; }
.sidebar-nav { flex: 1; padding: 8px 0; overflow-y: auto; }
.nav-item {
  padding: 10px 20px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-dim);
  transition: color 0.15s, background 0.15s;
  display: flex;
  align-items: center;
  gap: 10px;
  border-left: 2px solid transparent;
  letter-spacing: 0.1px;
}
.nav-item:hover { background: var(--bg-surface); color: var(--text-muted); }
.nav-item.active { color: var(--text); background: rgba(124,58,237,0.08); border-left-color: var(--indigo); font-weight: 600; }
.nav-item .icon { width: 18px; text-align: center; font-size: 14px; opacity: 0.8; }
.nav-item .badge { margin-left: auto; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; min-width: 18px; text-align: center; }
.sidebar-footer { padding: 14px 20px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); }
.sidebar-footer kbd { background: var(--bg-surface); border: 1px solid var(--border-focus); padding: 1px 5px; border-radius: 3px; font-family: var(--mono); font-size: 10px; color: var(--text-muted); }

/* ===== MAIN AREA ===== */
.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.main-scroll { flex: 1; overflow-y: auto; padding: var(--space-6) var(--space-8); }

/* ===== GOVERNANCE INTERNAL SIDEBAR ===== */
.workspace-with-sidebar { display: flex; height: 100%; overflow: hidden; }
.internal-sidebar { width: 180px; background: var(--bg); border-right: 1px solid var(--border); flex-shrink: 0; padding: 16px 0; overflow-y: auto; }
.internal-nav { padding: 8px 14px; cursor: pointer; font-size: 12px; color: var(--text-dim); border-radius: var(--radius-sm); margin: 2px 8px; transition: all 0.12s; }
.internal-nav:hover { background: var(--bg-surface); color: var(--text-muted); }
.internal-nav.active { background: var(--indigo-dim); color: var(--indigo); font-weight: 600; }
.internal-content { flex: 1; overflow-y: auto; padding: var(--space-6) var(--space-8); }

/* ===== LATTICE SPLIT PANE ===== */
.lattice-layout { display: flex; height: 100%; overflow: hidden; }
.lattice-filters { width: 220px; min-width: 180px; max-width: 260px; background: var(--bg); border-right: 1px solid var(--border); padding: var(--space-4); overflow-y: auto; flex-shrink: 0; }
.lattice-feed { flex: 0 0 40%; border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; }
.lattice-detail { flex: 1; overflow-y: auto; background: var(--bg-card); }
.lattice-detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); font-size: 13px; }

/* Live feed header */
.feed-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  flex-shrink: 0;
}

/* Live heartbeat indicator */
.heartbeat-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  animation: pulse-heartbeat 2s ease-in-out infinite;
}
@keyframes pulse-heartbeat {
  0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
  50%  { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
  100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}

/* Filter panel */
.filter-group { margin-bottom: 16px; }
.filter-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 700; margin-bottom: 6px; }
.filter-select, .filter-input {
  width: 100%;
  padding: 7px 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 12px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}
.filter-select:focus, .filter-input:focus { border-color: var(--indigo); box-shadow: 0 0 0 2px var(--indigo-dim); }
.filter-select option { background: var(--bg-card); }

/* Feed rows with slide-in animation */
.feed-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
  min-height: var(--row-h);
  animation: slideInFade 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
}
.feed-row:nth-child(1) { animation-delay: 0.00s; }
.feed-row:nth-child(2) { animation-delay: 0.05s; }
.feed-row:nth-child(3) { animation-delay: 0.10s; }
.feed-row:nth-child(4) { animation-delay: 0.15s; }
.feed-row:nth-child(5) { animation-delay: 0.20s; }
.feed-row:nth-child(n+6) { animation-delay: 0.25s; }

@keyframes slideInFade {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.feed-row:hover { background: var(--bg-surface); }
.feed-row.active { background: rgba(124,58,237,0.07); border-left: 2px solid var(--indigo); padding-left: 12px; }
.feed-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
.feed-icon.llm  { background: rgba(124,58,237,0.15); color: var(--indigo); }
.feed-icon.tool { background: rgba(16,185,129,0.15);  color: var(--green); }
.feed-icon.shell{ background: rgba(245,158,11,0.15);  color: var(--amber); }
.feed-icon.git  { background: rgba(239,68,68,0.15);   color: var(--red); }
.feed-icon.file { background: rgba(107,114,128,0.12); color: var(--text-dim); }
.feed-body { flex: 1; min-width: 0; }
.feed-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
.feed-meta  { font-size: 11px; color: var(--text-dim); font-family: var(--mono); margin-top: 2px; }
.feed-time  { font-size: 10px; color: var(--text-dim); font-family: var(--mono); flex-shrink: 0; }
.feed-severity { font-size: 10px; font-weight: 700; text-transform: uppercase; flex-shrink: 0; letter-spacing: 0.5px; }
.feed-severity.critical { color: var(--red); }
.feed-severity.warning  { color: var(--amber); }
.feed-severity.info     { color: var(--text-dim); }

/* Detail pane tabs */
.detail-tabs { display: flex; border-bottom: 1px solid var(--border); }
.detail-tab { padding: 10px 16px; font-size: 12px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.detail-tab:hover { color: var(--text-muted); }
.detail-tab.active { color: var(--indigo); border-bottom-color: var(--indigo); }
.detail-body { padding: var(--space-4); }

/* ===== AXIOM TABS ===== */
.axiom-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 var(--space-8); background: var(--bg-card); }
.axiom-tab { padding: 14px 20px; font-size: 13px; font-weight: 600; color: var(--text-dim); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; }
.axiom-tab:hover { color: var(--text-muted); }
.axiom-tab.active { color: var(--text); border-bottom-color: var(--indigo); }
.axiom-tab .count { display: inline-block; background: var(--red); color: #fff; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px; margin-left: 6px; }
.axiom-content { flex: 1; overflow-y: auto; padding: var(--space-6) var(--space-8); }

/* ===== CARDS — KPI style ===== */
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: var(--space-4); margin-bottom: var(--space-6); }
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: var(--space-6);
  box-shadow: 0 1px 3px var(--shadow);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.card:hover { border-color: var(--border-focus); }
body.dark .card { box-shadow: inset 0 1px 0 rgba(255,255,255,0.04); }
.card-label { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; margin-bottom: 8px; }
.card-value { font-size: var(--text-3xl); font-weight: 700; font-family: var(--mono); line-height: 1; letter-spacing: -1px; }
.card-value.green  { color: var(--green); }
.card-value.red    { color: var(--red); }
.card-value.amber  { color: var(--amber); }
.card-value.indigo { color: var(--indigo); }
.card-sub { font-size: 12px; color: var(--text-dim); margin-top: 6px; }

/* ===== BADGES ===== */
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; letter-spacing: 0.2px; }
.badge.critical { background: rgba(239,68,68,0.12);   color: var(--red); }
.badge.critical::before { content: '\26A0'; }
.badge.warning  { background: rgba(245,158,11,0.12);  color: var(--amber); }
.badge.warning::before  { content: '\25D0'; }
.badge.success  { background: rgba(16,185,129,0.12);  color: var(--green); }
.badge.success::before  { content: '\2713'; }
.badge.info     { background: rgba(124,58,237,0.1);   color: var(--indigo); }
.badge.neutral  { background: rgba(107,114,128,0.1);  color: var(--text-muted); }

/* ===== BUTTONS ===== */
.btn { padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; border: 1px solid var(--border-focus); background: var(--bg-surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s cubic-bezier(0.16,1,0.3,1); font-family: var(--font); }
.btn:hover { border-color: var(--indigo); color: var(--text); background: var(--bg-elevated); }
.btn.primary { background: var(--indigo); border-color: var(--indigo); color: #fff; }
.btn.primary:hover { background: #6d28d9; box-shadow: 0 0 0 3px var(--indigo-glow); }
.btn.danger { border-color: rgba(239,68,68,0.4); color: var(--red); background: transparent; }
.btn.danger:hover { background: rgba(239,68,68,0.1); border-color: var(--red); }

.btn-view { padding: 6px 14px; font-size: 12px; font-weight: 600; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-dim); border-radius: 6px; cursor: pointer; transition: all 0.15s; font-family: var(--font); }
.btn-view:hover { color: var(--text-muted); border-color: var(--border-focus); }
.btn-view.active { background: var(--indigo); color: #fff; border-color: var(--indigo); box-shadow: 0 0 0 2px var(--indigo-glow); }

/* ===== TABLES ===== */
.table-wrap { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 10px 16px; background: var(--bg-surface); color: var(--text-dim); font-weight: 700; font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; border-bottom: 1px solid var(--border); }
td { padding: 10px 16px; border-bottom: 1px solid var(--border); color: var(--text-muted); }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(124,58,237,0.04); color: var(--text); }
tr { height: var(--row-h); }

/* ===== CONTRADICTION RESOLUTION CARD ===== */
.contra-full { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; overflow: hidden; box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
.contra-full-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: var(--bg-surface); }
.contra-full-cols { display: grid; grid-template-columns: 1fr 1fr; }
.contra-col { padding: 16px 20px; }
.contra-col:first-child { border-right: 1px solid var(--border); }
.contra-col-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 700; margin-bottom: 8px; }
.contra-col h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: var(--text); }
.contra-col .meta { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
.contra-col pre { font-family: var(--mono); font-size: 11px; background: var(--bg); padding: 10px; border-radius: var(--radius-sm); overflow-x: auto; line-height: 1.6; color: var(--text-muted); border: 1px solid var(--border); }
.contra-rationale { padding: 0 20px 12px; }
.contra-rationale summary { cursor: pointer; font-size: 12px; color: var(--text-muted); font-weight: 600; padding: 8px 0; }
.contra-rationale .text { font-size: 12px; color: var(--text-muted); line-height: 1.6; padding: 4px 0 8px; }
.contra-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; position: sticky; bottom: 0; background: var(--bg-card); }

/* ===== DIMENSION TAGS ===== */
.dim-tag { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 3px; }

/* ===== SIGNAL INDICATORS ===== */
.signal-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
.signal-dot.red   { background: var(--red);   box-shadow: 0 0 6px rgba(239,68,68,0.5); }
.signal-dot.amber { background: var(--amber); box-shadow: 0 0 6px rgba(245,158,11,0.5); }
.signal-dot.green { background: var(--green); box-shadow: 0 0 6px rgba(16,185,129,0.5); }

/* ===== GRAPH CONTAINER ===== */
.graph-container { width: 100%; height: calc(100vh - 160px); background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); }
@keyframes contradictionPulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

/* Cytoscape — dot-matrix engineering grid background */
#cy {
  width: 100%;
  height: calc(100vh - 230px);
  background-color: var(--bg-card);
  background-image: radial-gradient(circle, var(--border) 1px, transparent 1px);
  background-size: 24px 24px;
  border: 1px solid var(--border);
  border-radius: var(--radius);
}

/* ===== DECISION MODAL ===== */
.decision-modal-overlay { position: fixed; inset: 0; background: var(--overlay-bg); z-index: 400; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.decision-modal { background: var(--bg-card); border: 1px solid var(--border-focus); border-radius: 10px; padding: 28px; width: 540px; max-width: 90vw; max-height: 80vh; overflow-y: auto; box-shadow: 0 32px 80px rgba(0,0,0,0.5); position: relative; }
.decision-modal-close { position: absolute; top: 16px; right: 16px; width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-surface); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; font-family: var(--font); transition: all 0.15s; }
.decision-modal-close:hover { background: var(--bg-elevated); color: var(--text); }

/* ===== SWIMLANE ===== */
.swimlane-wrap { width: 100%; overflow: auto; padding: 16px; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); min-height: 400px; }
.swimlane-row { display: flex; align-items: flex-start; border-bottom: 1px solid var(--border); }
.swimlane-row:last-child { border-bottom: none; }
.swimlane-label { width: 140px; min-width: 140px; padding: 16px 12px; font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.7px; border-right: 1px solid var(--border); display: flex; align-items: center; }
.swimlane-lane { flex: 1; padding: 12px 16px; display: flex; flex-wrap: wrap; gap: 10px; min-height: 64px; align-items: center; }
.swim-node { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; cursor: pointer; border: 1.5px solid transparent; transition: all 0.15s cubic-bezier(0.16,1,0.3,1); max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.swim-node:hover { filter: brightness(1.2); transform: translateY(-1px); box-shadow: 0 4px 12px var(--shadow); }
.swim-node .node-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.swim-edge-supersedes { font-size: 10px; color: var(--text-dim); display: flex; align-items: center; gap: 4px; padding: 0 4px; }
.swim-edge-supersedes::before { content: '→'; }
.swimlane-legend { display: flex; flex-wrap: wrap; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); }

/* ===== AUDIT ===== */
.audit-entry { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; min-height: var(--row-h); }
.audit-entry:last-child { border-bottom: none; }
.audit-time { font-family: var(--mono); font-size: 11px; color: var(--text-dim); min-width: 150px; }
.audit-type { font-weight: 600; min-width: 150px; color: var(--text-muted); }

/* ===== COMMAND PALETTE ===== */
.cmd-overlay { position: fixed; inset: 0; background: var(--overlay-bg); z-index: 300; display: none; align-items: flex-start; justify-content: center; padding-top: 18vh; backdrop-filter: blur(6px); }
.cmd-overlay.open { display: flex; }
.cmd-box { width: 580px; background: var(--bg-card); border: 1px solid var(--border-focus); border-radius: var(--radius); overflow: hidden; box-shadow: 0 24px 80px rgba(0,0,0,0.6); }
.cmd-input { width: 100%; padding: 16px 18px; background: transparent; border: none; color: var(--text); font-size: 15px; font-family: var(--font); outline: none; border-bottom: 1px solid var(--border); }
.cmd-input::placeholder { color: var(--text-dim); }
.cmd-hint { padding: 6px 18px; font-size: 11px; color: var(--text-dim); border-bottom: 1px solid var(--border); }
.cmd-hint kbd { background: var(--bg-surface); border: 1px solid var(--border-focus); padding: 1px 4px; border-radius: 3px; font-family: var(--mono); font-size: 10px; color: var(--text-muted); margin: 0 2px; }
.cmd-results { max-height: 360px; overflow-y: auto; }
.cmd-item { padding: 10px 18px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; transition: background 0.1s; color: var(--text-muted); }
.cmd-item:hover, .cmd-item.selected { background: var(--indigo-dim); color: var(--text); }
.cmd-item .cmd-label { display: flex; align-items: center; gap: 10px; }
.cmd-shortcut { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
.cmd-icon { font-size: 14px; width: 20px; text-align: center; opacity: 0.7; }

/* ===== ASSUMPTION CARDS ===== */
.assumption-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); margin-bottom: var(--space-3); transition: border-color 0.15s; }
.assumption-card:hover { border-color: var(--border-focus); }
.assumption-card .header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.assumption-card .question-box { margin: 8px 0; padding: 12px; background: var(--bg); border-left: 3px solid var(--indigo); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
.assumption-card .option { padding: 6px 10px; margin: 3px 0; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; transition: background 0.1s; color: var(--text-muted); }
.assumption-card .option:hover { background: var(--bg-surface); color: var(--text); }
.assumption-card .option.selected { background: rgba(16,185,129,0.15); color: var(--green); font-weight: 600; }
.assumption-card .evidence { font-family: var(--mono); font-size: 11px; background: var(--bg); padding: 10px; border-radius: var(--radius-sm); overflow-x: auto; margin-top: 6px; border: 1px solid var(--border); color: var(--text-muted); }

/* ===== SECTION HEADINGS ===== */
.page-title { font-size: var(--text-xl); font-weight: 700; margin-bottom: var(--space-6); color: var(--text); letter-spacing: -0.3px; }
.section-title { font-size: var(--text-xs); font-weight: 700; margin-bottom: var(--space-3); color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; }

/* ===== PROGRESS BAR ===== */
.progress-bar { height: 6px; background: var(--bg-elevated); border-radius: 3px; overflow: hidden; margin-bottom: var(--space-4); }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s cubic-bezier(0.16,1,0.3,1); }
.progress-fill.green { background: var(--green); box-shadow: 0 0 8px rgba(16,185,129,0.4); }
.progress-fill.amber { background: var(--amber); }
.progress-fill.red   { background: var(--red); }

/* ===== COMPLIANCE FRAMEWORK CARDS ===== */
.fw-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); cursor: pointer; transition: border-color 0.15s; position: relative; overflow: hidden; }
.fw-card:hover { border-color: var(--border-focus); }
.fw-card.alert { border-color: rgba(239,68,68,0.5); }
.fw-card .fw-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.fw-card .fw-status { font-size: 12px; }
.fw-coming-overlay { position: absolute; inset: 0; background: rgba(248,249,250,0.85); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 2; border-radius: var(--radius); }
body.dark .fw-coming-overlay { background: rgba(22,24,29,0.88); }
.fw-coming-pill { font-size: 10px; font-weight: 700; background: var(--bg-elevated); color: var(--text-dim); padding: 3px 10px; border-radius: 10px; border: 1px solid var(--border); letter-spacing: 0.5px; }

/* ===== AGENT CARDS ===== */
.agent-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--space-4); transition: border-color 0.15s; }
.agent-card:hover { border-color: var(--border-focus); }
.agent-card .agent-name { font-size: 14px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
.agent-card .agent-role { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
.drift-gauge { height: 4px; background: var(--bg-elevated); border-radius: 2px; margin: 10px 0; position: relative; overflow: hidden; }
.drift-fill { height: 100%; border-radius: 2px; transition: width 0.4s cubic-bezier(0.16,1,0.3,1); }
.permission-chip { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 600; margin: 2px; }
.permission-chip.allow { background: rgba(16,185,129,0.12); color: var(--green); }
.permission-chip.block { background: rgba(239,68,68,0.12); color: var(--red); }

/* ===== SPARKLINES ===== */
.sparkline-path { fill: none; stroke-width: 1.5; }
.area-critical { fill: url(#grad-critical); }
.area-blue { fill: url(#grad-blue); }
.area-amber { fill: url(#grad-amber); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .sidebar { width: 56px; }
  .sidebar-logo .sub, .nav-item span:not(.icon), .nav-item .badge, .sidebar-footer { display: none; }
  .sidebar-logo { font-size: 12px; padding: 12px 8px; text-align: center; }
  .nav-item { padding: 12px 0; justify-content: center; border-left: none; border-bottom: 2px solid transparent; }
  .nav-item.active { border-bottom-color: var(--indigo); border-left-color: transparent; }
  .main-scroll { padding: 16px; }
  .cards { grid-template-columns: repeat(2, 1fr); }
  .contra-full-cols { grid-template-columns: 1fr; }
  .contra-col:first-child { border-right: none; border-bottom: 1px solid var(--border); }
  .lattice-layout { flex-direction: column; }
  .lattice-filters { display: none; }
  .lattice-feed { width: 100%; height: 50%; }
  .lattice-detail { width: 100%; height: 50%; }
  .workspace-with-sidebar .internal-sidebar { display: none; }
  [data-page="lattice"], [data-page="axiom"], [data-page="alignment"] { display: none !important; }
}

/* ===== HIGH DENSITY TOGGLE ===== */
.density-toggle { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-dim); cursor: pointer; }
.density-toggle input { accent-color: var(--indigo); }

/* ===== THEME TOGGLE ===== */
.theme-toggle { background: none; border: 1px solid var(--border); border-radius: var(--radius-sm); width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--text-dim); transition: all 0.15s; flex-shrink: 0; line-height: 1; padding: 0; }
.theme-toggle:hover { border-color: var(--indigo); color: var(--indigo); }
</style>
</head>

<!-- SVG gradient defs for sparklines — zero-size, hidden -->

<script>
/* ===== GLOBALS ===== */
const API = '';
let currentWorkspace = 'home';
let currentGovTab = 'agents';
let currentAxiomTab = 'contradictions';
let ws = null;
let selectedTraceId = null;

/* ===== DIMENSION COLORS (categorical only) ===== */
const DIM_COLORS = {
  database:'#22d3ee', auth:'#f472b6', caching:'#fb923c', api_style:'#34D399',
  deployment:'#818CF8', concurrency:'#a78bfa', logging:'#64748b', testing:'#22d3ee',
  error_handling:'#F87171', state_management:'#fb923c', messaging:'#38bdf8', security:'#f472b6'
};
/* ===== GRAPH-SPECIFIC COLORS (per spec) ===== */
const GRAPH_DIM_COLORS = {
  database:'#06b6d4', 'api-style':'#a855f7', api_style:'#a855f7', api:'#a855f7',
  testing:'#22c55e', security:'#ec4899', auth:'#ec4899',
  deployment:'#f97316', 'error-handling':'#eab308', error_handling:'#eab308', error:'#eab308',
  caching:'#fb923c', concurrency:'#818CF8', logging:'#64748b',
  messaging:'#f59e0b', 'state-management':'#38bdf8', state_management:'#38bdf8', other:'#818CF8',
};
let _cy = null;
let _ledgerView = 'graph';
let _graphData = null;
const ACTION_ICONS = { llm_call:'&#9674;', mcp_tool:'&#9881;', shell_command:'&#9002;', git_operation:'&#8646;', file_read:'&#9744;', hook:'&#9889;', cli:'&#9654;' };
const ACTION_CLASSES = { llm_call:'llm', mcp_tool:'tool', shell_command:'shell', git_operation:'git', file_read:'file', hook:'tool', cli:'shell' };

/* ===== HELPERS ===== */
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
function fmtTime(ts) { if (!ts) return ''; try { return new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}); } catch { return ''; } }
function fmtDate(ts) { if (!ts) return ''; try { return new Date(ts).toLocaleDateString(); } catch { return ''; } }
function dimTag(dim) { const c = DIM_COLORS[dim] || getComputedStyle(document.body).getPropertyValue('--indigo').trim(); return `<span class="dim-tag" style="background:${c}22;color:${c}">${dim}</span>`; }
function severityBadge(sev) {
  const map = { critical:'critical', high:'critical', warning:'warning', medium:'warning', low:'info', info:'info' };
  return `<span class="badge ${map[sev] || 'neutral'}">${sev}</span>`;
}
function statusBadge(status) {
  const map = { healthy:'success', degraded:'warning', critical:'critical', active:'success', superseded:'neutral',
    unresolved:'critical', resolved:'success', deferred:'warning', ignored:'neutral',
    proposed:'warning', validated:'success', rejected:'critical', detected:'info',
    implemented:'success', partial:'warning', not_started:'neutral', diverged:'critical' };
  return `<span class="badge ${map[status] || 'neutral'}">${status}</span>`;
}

/* ===== NAVIGATION ===== */
document.querySelectorAll('#sidebar-nav .nav-item').forEach(item => {
  item.addEventListener('click', () => navTo(item.dataset.page));
});

function navTo(page) {
  document.querySelectorAll('#sidebar-nav .nav-item').forEach(i => i.classList.toggle('active', i.dataset.page === page));
  currentWorkspace = page;
  loadWorkspace(page);
  closeCmdPalette();
}

function loadWorkspace(ws) {
  const area = document.getElementById('main-area');
  switch(ws) {
    case 'home': loadHome(area); break;
    case 'lattice': loadLattice(area); break;
    case 'axiom': loadAxiom(area); break;
    case 'alignment': loadAlignment(area); break;
    case 'governance': loadGovernance(area); break;
  }
}

/* ===================================================================
   HOME — Triage Dashboard
   =================================================================== */
async function loadHome(el) {
  el.innerHTML = `<div class="main-scroll" id="home-scroll">
    <div class="page-title">Home</div>
    <div class="cards" id="home-cards"></div>
    <div class="section-title">Urgent Triage</div>
    <div id="home-triage"></div>
    <div class="section-title" style="margin-top:24px">Golden Signals</div>
    <div class="table-wrap" id="home-signals"></div>
  </div>`;
  try {
    const data = await fetch(API + '/api/home').then(r => r.json());
    renderHomeCards(data.health);
    renderHomeTriage(data.triage);
    renderHomeSignals(data.signals);
  } catch(e) {
    // Fallback to /api/health if /api/home not available
    try {
      const [health, contras] = await Promise.all([
        fetch(API + '/api/health').then(r => r.json()),
        fetch(API + '/api/contradictions').then(r => r.json()),
      ]);
      renderHomeCards({
        coherence_score: health.coherence_score, status: health.status,
        total_decisions: health.total_decisions, active_decisions: health.active_decisions,
        open_contradictions: health.actionable_contradictions,
        highest_drift: {agent:'none', score:0}, anomalous_llm_calls: 0, pending_assumptions: 0
      });
      renderHomeTriage({ total: contras.total, contradictions: contras.contradictions.slice(0, 5) });
      renderHomeSignals([]);
    } catch(e2) { document.getElementById('home-scroll').innerHTML += `<p style="color:var(--red)">Failed to load: ${esc(e2.message)}</p>`; }
  }
}

function renderHomeCards(h) {
  const cards = document.getElementById('home-cards');
  const ccls = h.coherence_score >= 0.8 ? 'green' : h.coherence_score >= 0.5 ? 'amber' : 'red';
  const driftCls = h.highest_drift.score >= 0.7 ? 'red' : h.highest_drift.score >= 0.4 ? 'amber' : 'green';
  cards.innerHTML = `
    <div class="card"><div class="card-label">Coherence</div><div class="card-value ${ccls}">${Math.round(h.coherence_score*100)}%</div><div class="card-sub">${statusBadge(h.status)}</div></div>
    <div class="card"><div class="card-label">Open Critical</div><div class="card-value ${h.open_contradictions ? 'red' : 'green'}">${h.open_contradictions}</div><div class="card-sub">contradictions</div></div>
    <div class="card"><div class="card-label">Highest Drift</div><div class="card-value ${driftCls}" style="font-size:18px">${esc(h.highest_drift.agent)}</div><div class="card-sub">${h.highest_drift.score.toFixed(2)} drift</div></div>
    <div class="card"><div class="card-label">LLM Anomalies</div><div class="card-value ${h.anomalous_llm_calls ? 'amber' : 'green'}">${h.anomalous_llm_calls}</div><div class="card-sub">flagged calls</div></div>
  `;
}

function renderHomeTriage(triage) {
  const el = document.getElementById('home-triage');
  if (!triage.contradictions || !triage.contradictions.length) {
    el.innerHTML = '<div class="card" style="text-align:center;color:var(--green);padding:20px"><span class="badge success">All Clear</span> No unresolved contradictions</div>';
    return;
  }
  el.innerHTML = triage.contradictions.map(c => renderContraCard(c)).join('');
}

function renderContraCard(c) {
  return `<div class="contra-full">
    <div class="contra-full-header">
      ${severityBadge(c.verdict === 'contradiction' ? 'critical' : 'warning')}
      <span style="font-weight:600;flex:1">${esc(c.decision_a_title)} vs ${esc(c.decision_b_title)}</span>
      <span style="font-family:var(--mono);font-size:11px;color:var(--text-dim)">${Math.round(c.confidence*100)}% NLI</span>
    </div>
    <div class="contra-full-cols">
      <div class="contra-col">
        <div class="contra-col-label">Decision A</div>
        <h4>${esc(c.decision_a_title)}</h4>
        <div class="meta">${(c.shared_dimensions||[]).map(d => dimTag(d)).join(' ')}</div>
        <pre>${esc(c.evidence_a)}</pre>
      </div>
      <div class="contra-col">
        <div class="contra-col-label">Decision B</div>
        <h4>${esc(c.decision_b_title)}</h4>
        <div class="meta">${(c.shared_dimensions||[]).map(d => dimTag(d)).join(' ')}</div>
        <pre>${esc(c.evidence_b)}</pre>
      </div>
    </div>
    <div class="contra-rationale"><details><summary>View Rationale</summary><div class="text">${esc(c.reasoning)}</div></details></div>
    <div class="contra-footer">
      ${c.status === 'deferred'
        ? `<span class="badge" style="background:var(--amber,#f59e0b);color:#fff;font-size:11px;padding:3px 10px;border-radius:6px;font-weight:600">Deferred</span>`
        : `<button class="btn primary" onclick="resolveContra('${c.id}','${c.decision_a_id}','Accept A')">Accept A</button>
      <button class="btn primary" onclick="resolveContra('${c.id}','${c.decision_b_id}','Accept B')">Accept B</button>
      <button class="btn" onclick="resolveContra('${c.id}','both','Both Stay')">Both Stay</button>
      <button class="btn" onclick="deferContra('${c.id}')">Defer</button>
      <button class="btn danger" onclick="resolveContra('${c.id}','exception','Create Exception')">Create Exception</button>`}
    </div>
  </div>`;
}

function renderHomeSignals(signals) {
  const el = document.getElementById('home-signals');
  if (!signals || !signals.length) {
    el.innerHTML = '<div style="padding:14px;color:var(--text-dim)">No signal data available.</div>';
    return;
  }
  el.innerHTML = signals.map(s => {
    const dotCls = s.status === 'red' ? 'red' : s.status === 'yellow' ? 'amber' : 'green';
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border)">
      <span class="signal-dot ${dotCls}"></span>
      <span style="flex:1;font-weight:500">${esc(s.signal.replace(/_/g,' '))}</span>
      <span style="font-family:var(--mono);font-size:12px;color:var(--text-muted)">${s.count}</span>
    </div>`;
  }).join('');
}

async function resolveContra(id, winnerId, rationale) {
  try {
    await fetch(API + '/api/contradictions/' + id + '/resolve', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ winner_id: winnerId, rationale })
    });
    loadWorkspace(currentWorkspace);
    // Refresh nav badge so resolved contradictions are no longer counted (Bug 6 fix)
    updateBadges();
  } catch(e) { alert('Failed: ' + e.message); }
}

async function deferContra(id) {
  try {
    await fetch(API + '/api/contradictions/' + id + '/defer', { method: 'POST' });
    loadWorkspace(currentWorkspace);
    updateBadges();
  } catch(e) { alert('Failed: ' + e.message); }
}

// Bug 6 fix: always remove old badge and re-render with current unresolved count.
async function updateBadges() {
  try {
    const data = await fetch(API + '/api/contradictions?status=unresolved').then(r => r.json());
    const axiomNav = document.querySelector('[data-page="axiom"]');
    if (!axiomNav) return;
    // Remove any existing badge (stale count)
    const existing = axiomNav.querySelector('.nav-badge');
    if (existing) existing.remove();
    // Add fresh badge only when there are unresolved contradictions
    if (data.total > 0) {
      const badge = document.createElement('span');
      badge.className = 'nav-badge';
      badge.style.cssText = 'margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center';
      badge.textContent = data.total;
      axiomNav.appendChild(badge);
    }
  } catch {}
}

/* ===================================================================
   LATTICE — Unified Observation (Filter + Feed + Detail)
   =================================================================== */
async function loadLattice(el) {
  el.innerHTML = `<div class="lattice-layout">
    <div class="lattice-filters" id="lattice-filters">
      <div style="font-weight:700;font-size:13px;margin-bottom:12px">Filters</div>
      <div class="filter-group"><div class="filter-label">Action Type</div>
        <select class="filter-select" id="lf-action" onchange="applyLatticeFilters()">
          <option value="">All</option><option value="llm_call">LLM Call</option><option value="mcp_tool">MCP Tool</option>
          <option value="shell_command">Shell</option><option value="git_operation">Git</option><option value="file_read">File Read</option>
          <option value="hook">Hook</option><option value="cli">CLI</option>
        </select></div>
      <div class="filter-group"><div class="filter-label">Agent</div>
        <select class="filter-select" id="lf-agent" onchange="applyLatticeFilters()"><option value="">All</option></select></div>
      <div class="filter-group"><div class="filter-label">Severity</div>
        <select class="filter-select" id="lf-severity" onchange="applyLatticeFilters()">
          <option value="">All</option><option value="critical">Critical</option><option value="warning">Warning</option><option value="info">Info</option>
        </select></div>
      <div class="filter-group"><div class="filter-label">Search</div>
        <input class="filter-input" id="lf-search" placeholder="trace id, model..." oninput="applyLatticeFilters()"></div>
      <div class="density-toggle" style="margin-top:12px"><input type="checkbox" id="density-toggle" onchange="document.body.classList.toggle('high-density',this.checked)"> <span>High Density</span></div>
    </div>
    <div class="lattice-feed" id="lattice-feed-wrapper" style="display:flex;flex-direction:column;flex:0 0 40%;border-right:1px solid var(--border);overflow:hidden;">
      <div class="feed-header"><span class="heartbeat-dot"></span>Live Events</div>
      <div id="lattice-feed" style="flex:1;overflow-y:auto"><div style="padding:20px;color:var(--text-dim)">Loading traces...</div></div>
    </div>
    <div class="lattice-detail" id="lattice-detail"><div class="lattice-detail-empty">Select a trace to view details</div></div>
  </div>`;
  try {
    const data = await fetch(API + '/api/traces?limit=200').then(r => r.json());
    window._latticeData = data;
    // Populate agent filter
    const agents = new Set();
    (data.entries || data.spans || []).forEach(e => { if (e.agent_id) agents.add(e.agent_id); });
    const agentSel = document.getElementById('lf-agent');
    agents.forEach(a => { const o = document.createElement('option'); o.value = a; o.text = a; agentSel.add(o); });
    renderLatticeSummary(data.summary || {});
    renderLatticeFeed(data.entries || data.spans || []);
    // Poll every 2 seconds for live updates
    if (window._latticePoller) clearInterval(window._latticePoller);
    window._latticePoller = setInterval(async () => {
      try {
        const fresh = await fetch(API + '/api/traces?limit=200').then(r => r.json());
        window._latticeData = fresh;
        renderLatticeSummary(fresh.summary || {});
        applyLatticeFilters();
      } catch(_) {}
    }, 2000);
  } catch(e) { document.getElementById('lattice-feed').innerHTML = `<div style="padding:20px;color:var(--red)">Failed: ${esc(e.message)}</div>`; }
}

function renderLatticeSummary(s) {
  const el = document.getElementById('lattice-filters');
  if (!el) return;
  let existing = document.getElementById('lattice-summary');
  const html = `<div id="lattice-summary" style="margin-top:16px;padding-top:12px;border-top:1px solid var(--border)">
    <div style="font-weight:700;font-size:12px;margin-bottom:8px">Session Summary</div>
    <div style="font-size:11px;color:var(--text-muted);line-height:1.8">
      <div>Total events: <b style="color:var(--text)">${s.total_activities || 0}</b></div>
      <div>Total tokens: <b style="color:var(--text)">${(s.total_tokens_in || 0) + (s.total_tokens_out || 0)}</b></div>
      <div>Est. cost: <b style="color:var(--text)">$${(s.total_cost_usd || 0).toFixed(4)}</b></div>
      <div>LLM calls: <b style="color:var(--text)">${(s.action_counts || {}).llm_call || 0}</b></div>
      <div>Hook events: <b style="color:var(--text)">${(s.action_counts || {}).hook || 0}</b></div>
      <div>CLI events: <b style="color:var(--text)">${(s.action_counts || {}).cli || 0}</b></div>
      <div>Avg latency: <b style="color:var(--text)">${s.avg_latency_ms ? s.avg_latency_ms + 'ms' : 'N/A'}</b></div>
    </div>
  </div>`;
  if (existing) { existing.outerHTML = html; } else { el.insertAdjacentHTML('beforeend', html); }
}

function applyLatticeFilters() {
  if (!window._latticeData) return;
  let entries = window._latticeData.entries || window._latticeData.spans || [];
  const action = document.getElementById('lf-action').value;
  const agent = document.getElementById('lf-agent').value;
  const severity = document.getElementById('lf-severity').value;
  const search = document.getElementById('lf-search').value.toLowerCase();
  if (action) entries = entries.filter(e => e.action_type === action);
  if (agent) entries = entries.filter(e => e.agent_id === agent);
  if (severity) entries = entries.filter(e => e.severity === severity);
  if (search) entries = entries.filter(e => JSON.stringify(e).toLowerCase().includes(search));
  renderLatticeFeed(entries);
}

function renderLatticeFeed(entries) {
  const feed = document.getElementById('lattice-feed');
  if (!entries.length) { feed.innerHTML = '<div style="padding:20px;color:var(--text-dim)">No traces match filters.</div>'; return; }
  // Store entries by index so onclick can look them up without embedding JSON in HTML
  window._latticeEntries = entries.slice();
  feed.innerHTML = entries.map((e, idx) => {
    const type = e.action_type || 'llm_call';
    const icon = ACTION_ICONS[type] || '&#9679;';
    const cls = ACTION_CLASSES[type] || 'file';
    const title = e.summary || e.tool_name || e.model || type;
    const isActive = selectedTraceId === (e.entry_id || e.span_id) ? ' active' : '';
    // For hook/cli events, show pass/block badge
    const d = e.details || {};
    let resultBadge = '';
    if ((type === 'hook' || type === 'cli') && d.result) {
      const color = d.result === 'block' ? 'var(--red)' : 'var(--green)';
      resultBadge = `<span class="permission-chip" style="background:${d.result === 'block' ? 'rgba(248,113,113,0.15)' : 'rgba(52,211,153,0.15)'};color:${color}">${d.result}</span>`;
    }
    return `<div class="feed-row${isActive}" onclick="selectTraceByIdx(this,${idx})" data-id="${esc(e.entry_id || e.span_id || '')}">
      <div class="feed-icon ${cls}">${icon}</div>
      <div class="feed-body">
        <div class="feed-title">${esc(title)} ${resultBadge}</div>
        <div class="feed-meta">${esc(e.agent_id || '')} ${d.file ? '&middot; ' + esc(d.file) : ''} ${e.duration_ms ? '&middot; ' + e.duration_ms + 'ms' : ''}</div>
      </div>
      <span class="feed-severity ${e.severity || 'info'}">${e.severity || 'info'}</span>
      <span class="feed-time">${fmtTime(e.timestamp)}</span>
    </div>`;
  }).join('');
}

function selectTraceByIdx(rowEl, idx) {
  document.querySelectorAll('.feed-row.active').forEach(r => r.classList.remove('active'));
  rowEl.classList.add('active');
  const entry = (window._latticeEntries || [])[idx];
  if (!entry) return;
  selectedTraceId = entry.entry_id || entry.span_id;
  renderTraceDetail(entry);
}

function renderTraceDetail(e) {
  const det = document.getElementById('lattice-detail');
  const details = e.details || {};
  det.innerHTML = `
    <div class="detail-tabs">
      <div class="detail-tab active" onclick="showDetailTab(this,'trace-tab')">Trace Detail</div>
      <div class="detail-tab" onclick="showDetailTab(this,'prov-tab')">Provenance</div>
    </div>
    <div id="trace-tab" class="detail-body">
      <div style="margin-bottom:12px"><span class="badge info">${esc(e.action_type || 'llm_call')}</span> ${severityBadge(e.severity || 'info')}</div>
      <div style="margin-bottom:8px;font-weight:600;font-size:14px">${esc(e.summary || e.tool_name || '')}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div class="card"><div class="card-label">Agent</div><div style="font-family:var(--mono);font-size:12px">${esc(e.agent_id || 'unknown')}</div></div>
        <div class="card"><div class="card-label">Duration</div><div style="font-family:var(--mono);font-size:12px">${e.duration_ms || 0}ms</div></div>
        ${details.model ? `<div class="card"><div class="card-label">Model</div><div style="font-family:var(--mono);font-size:12px">${esc(details.model)}</div></div>` : ''}
        ${details.provider ? `<div class="card"><div class="card-label">Provider</div><div style="font-family:var(--mono);font-size:12px">${esc(details.provider)}</div></div>` : ''}
        ${(details.input_tokens ?? details.tokens_in) != null ? `<div class="card"><div class="card-label">Tokens In</div><div style="font-family:var(--mono);font-size:12px">${details.input_tokens ?? details.tokens_in}</div></div>` : ''}
        ${(details.output_tokens ?? details.tokens_out) != null ? `<div class="card"><div class="card-label">Tokens Out</div><div style="font-family:var(--mono);font-size:12px">${details.output_tokens ?? details.tokens_out}</div></div>` : ''}
        ${details.cost_usd != null ? `<div class="card"><div class="card-label">Cost</div><div style="font-family:var(--mono);font-size:12px">$${Number(details.cost_usd).toFixed(4)}</div></div>` : ''}
        ${details.action ? `<div class="card"><div class="card-label">Action</div><div style="font-family:var(--mono);font-size:12px">${esc(details.action)}</div></div>` : ''}
        ${details.result ? `<div class="card"><div class="card-label">Result</div><div style="font-family:var(--mono);font-size:12px;color:${details.result==='block'?'var(--red)':'var(--green)'}">${esc(details.result)}</div></div>` : ''}
      </div>
      <div class="section-title">Timestamp</div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--text-muted);margin-bottom:12px">${e.timestamp || ''}</div>
      ${(details.file || details.file_path) ? `<div class="section-title">File</div><div style="font-family:var(--mono);font-size:12px;color:var(--text-muted);margin-bottom:12px">${esc(details.file || details.file_path)}</div>` : ''}
      ${details.reason ? `<div class="section-title">Reason</div><div style="font-family:var(--mono);font-size:12px;color:var(--text-muted);margin-bottom:12px">${esc(details.reason)}</div>` : ''}
      ${details.prompt_preview ? `<div class="section-title">Prompt Preview</div><pre style="font-family:var(--mono);font-size:11px;background:var(--bg);padding:8px;border-radius:4px;margin-bottom:12px;overflow-x:auto;white-space:pre-wrap">${esc(details.prompt_preview)}</pre>` : ''}
      ${details.command ? `<div class="section-title">Command</div><pre style="font-family:var(--mono);font-size:11px;background:var(--bg);padding:8px;border-radius:4px;margin-bottom:12px;overflow-x:auto">${esc(details.command)}</pre>` : ''}
      <div style="font-family:var(--mono);font-size:10px;color:var(--text-dim)">ID: ${esc(e.entry_id || e.span_id || '')}</div>
    </div>
    <div id="prov-tab" class="detail-body" style="display:none">
      <div style="color:var(--text-dim);padding:20px;text-align:center">Provenance graph for this trace. <br>Run agent sessions to capture causal links.</div>
      <div id="trace-prov-graph" style="height:300px;background:var(--bg);border-radius:var(--radius)"></div>
    </div>
  `;
}

function showDetailTab(tabEl, tabId) {
  tabEl.parentElement.querySelectorAll('.detail-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  tabEl.parentElement.parentElement.querySelectorAll('.detail-body').forEach(b => b.style.display = 'none');
  document.getElementById(tabId).style.display = 'block';
}

/* ===================================================================
   AXIOM — Contradictions + Decision Ledger
   =================================================================== */
async function loadAxiom(el) {
  const contraCount = await fetch(API + '/api/contradictions?status=unresolved').then(r => r.json()).then(d => d.total).catch(() => 0);
  el.innerHTML = `
    <div class="axiom-tabs">
      <div class="axiom-tab active" data-tab="contradictions" onclick="switchAxiomTab(this,'contradictions')">Contradictions ${contraCount ? `<span class="count">${contraCount}</span>` : ''}</div>
      <div class="axiom-tab" data-tab="ledger" onclick="switchAxiomTab(this,'ledger')">Decision Ledger</div>
    </div>
    <div class="axiom-content" id="axiom-content"></div>
  `;
  currentAxiomTab = 'contradictions';
  loadAxiomContradictions();
}

function switchAxiomTab(tabEl, tab) {
  tabEl.parentElement.querySelectorAll('.axiom-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  currentAxiomTab = tab;
  if (tab === 'contradictions') loadAxiomContradictions();
  else loadAxiomLedger();
}

async function loadAxiomContradictions() {
  const el = document.getElementById('axiom-content');
  el.innerHTML = '<div style="color:var(--text-dim)">Loading...</div>';
  try {
    const [unresolvedData, deferredData] = await Promise.all([
      fetch(API + '/api/contradictions').then(r => r.json()),
      fetch(API + '/api/contradictions?status=deferred').then(r => r.json()),
    ]);
    const all = [...unresolvedData.contradictions, ...deferredData.contradictions];
    if (!all.length) {
      el.innerHTML = '<div class="card" style="text-align:center;padding:24px"><span class="badge success">Clean</span> No unresolved contradictions.</div>';
      return;
    }
    el.innerHTML = all.map(c => renderContraCard(c)).join('');
  } catch(e) { el.innerHTML = `<p style="color:var(--red)">Failed: ${esc(e.message)}</p>`; }
}

async function loadAxiomLedger() {
  const el = document.getElementById('axiom-content');
  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="section-title" style="margin:0">Decision Knowledge Graph</div>
      <div style="display:flex;gap:8px">
        <button id="view-graph-btn" class="btn-view active" onclick="switchLedgerView('graph')">&#9671; Graph</button>
        <button id="view-swim-btn" class="btn-view" onclick="switchLedgerView('swimlane')">&#9776; Swimlane</button>
      </div>
    </div>
    <div id="ledger-wrapper" style="position:relative"></div>
  `;
  try {
    const data = await fetch(API + '/api/graph').then(r => r.json());
    if (!data.nodes.length) {
      document.getElementById('ledger-wrapper').innerHTML =
        '<div class="card" style="text-align:center;padding:32px;color:var(--text-dim)">No decisions recorded yet.</div>';
      return;
    }
    _graphData = data;
    renderCytoscape(data);
  } catch(e) { el.innerHTML = `<p style="color:var(--red)">Failed: ${esc(e.message)}</p>`; }
}

function switchLedgerView(view) {
  _ledgerView = view;
  document.getElementById('view-graph-btn').classList.toggle('active', view === 'graph');
  document.getElementById('view-swim-btn').classList.toggle('active', view === 'swimlane');
  if (view === 'graph') {
    renderCytoscape(_graphData);
  } else {
    if (_cy) { _cy.destroy(); _cy = null; }
    renderSwimlane(_graphData);
  }
}

function renderCytoscape(data) {
  if (_cy) { _cy.destroy(); _cy = null; }
  const wrapper = document.getElementById('ledger-wrapper');
  wrapper.innerHTML = `
    <div id="cy"></div>
    <div id="cy-tooltip" style="position:fixed;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;font-size:12px;color:var(--text);max-width:300px;pointer-events:none;z-index:9999;display:none;box-shadow:0 8px 32px rgba(0,0,0,0.18)"></div>
    <div id="cy-legend" style="position:absolute;bottom:16px;left:16px;background:var(--bg-surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:11px;color:var(--text-muted);max-width:160px;z-index:10"></div>
    <div style="position:absolute;bottom:16px;right:16px;font-size:11px;color:var(--text-dim);z-index:10">Scroll to zoom · Drag to pan · Click node for details</div>
  `;

  // Register fcose layout if available and not yet registered
  try { if (typeof cytoscapeFcose !== 'undefined') cytoscape.use(cytoscapeFcose); } catch {}

  // Maps
  const supersededBy = {};
  data.edges.forEach(e => {
    if (e.data.type === 'SUPERSEDES') supersededBy[e.data.target] = e.data.source;
  });

  const elements = [];
  data.nodes.forEach(n => {
    const dim = (n.data.dimensions || [])[0] || 'other';
    const color = GRAPH_DIM_COLORS[dim] || '#818CF8';
    const isSuperseded = !!supersededBy[n.data.id];
    const rawLabel = n.data.label || n.data.title || n.data.id || '';
    // Word-wrap label: max 18 chars per line
    const words = rawLabel.split(' ');
    let lines = [], line = '';
    words.forEach(w => {
      if ((line + ' ' + w).trim().length > 18 && line) { lines.push(line); line = w; }
      else { line = (line + ' ' + w).trim(); }
    });
    if (line) lines.push(line);
    const label = lines.slice(0, 3).join('\n') + (lines.length > 3 ? '…' : '');
    elements.push({ group: 'nodes', data: {
      id: n.data.id, label, fullLabel: rawLabel, dim, color, isSuperseded,
      confidence: n.data.confidence || 0,
      content: n.data.content || '',
      decision_type: n.data.decision_type || '',
      dimensions: (n.data.dimensions || []).join(', '),
    }});
  });

  data.edges.forEach(e => {
    // Only add edge if both nodes exist
    const src = data.nodes.find(n => n.data.id === e.data.source);
    const tgt = data.nodes.find(n => n.data.id === e.data.target);
    if (!src || !tgt) return;
    elements.push({ group: 'edges', data: {
      id: e.data.id || `${e.data.source}__${e.data.target}__${e.data.type}`,
      source: e.data.source, target: e.data.target, type: e.data.type,
    }});
  });

  _cy = cytoscape({
    container: document.getElementById('cy'),
    elements,
    style: [
      // --- Node base ---
      { selector: 'node', style: {
        shape: 'ellipse',
        width: 88, height: 88,
        'background-color': '#2a2d35',
        'background-opacity': 1,
        'border-width': 3,
        'border-color': 'data(color)',
        'border-opacity': 1,
        label: 'data(label)',
        'text-valign': 'center',
        'text-halign': 'center',
        'font-size': '10px',
        'font-family': 'Geist, system-ui, sans-serif',
        'font-weight': '600',
        color: '#f8fafe',
        'text-wrap': 'wrap',
        'text-max-width': '76px',
        'text-outline-width': 0,
        'z-index': 10,
        'transition-property': 'border-width, border-color, background-color',
        'transition-duration': '0.15s',
      }},
      // --- Superseded node — faded to 30% ---
      { selector: 'node[?isSuperseded]', style: {
        'background-color': '#1e2028',
        'background-opacity': 0.5,
        'border-opacity': 0.3,
        'color': 'rgba(248,250,254,0.3)',
      }},
      // --- Hover ---
      { selector: 'node:active', style: {
        'border-width': 4,
        'border-color': '#ffffff',
        'background-opacity': 1,
        'z-index': 999,
      }},
      // --- SUPERSEDES edge: thick red with arrow ---
      { selector: 'edge[type="SUPERSEDES"]', style: {
        width: 3,
        'line-color': '#ef4444',
        'target-arrow-color': '#ef4444',
        'target-arrow-shape': 'triangle',
        'curve-style': 'bezier',
        'arrow-scale': 1.5,
        opacity: 0.9,
        'z-index': 5,
      }},
      // --- CONTRADICTION edge: thick red dashed (pulsing via CSS) ---
      { selector: 'edge[type="CONTRADICTION"]', style: {
        width: 3,
        'line-color': '#ef4444',
        'line-style': 'dashed',
        'line-dash-pattern': [8, 4],
        'target-arrow-shape': 'none',
        'curve-style': 'bezier',
        opacity: 1,
        'z-index': 5,
      }},
      // --- SHARED_DIMENSION: thin gray dashed ---
      { selector: 'edge[type="SHARED_DIMENSION"]', style: {
        width: 1.5,
        'line-color': '#6b7280',
        'line-style': 'dashed',
        'line-dash-pattern': [4, 4],
        'target-arrow-shape': 'none',
        'curve-style': 'bezier',
        opacity: 0.45,
      }},
      // --- TENSION: amber dashed ---
      { selector: 'edge[type="TENSION"]', style: {
        width: 2,
        'line-color': '#f59e0b',
        'line-style': 'dashed',
        'target-arrow-shape': 'none',
        'curve-style': 'bezier',
        opacity: 0.7,
      }},
      // --- default edge ---
      { selector: 'edge', style: {
        width: 1,
        'line-color': '#4b5563',
        'curve-style': 'bezier',
        opacity: 0.3,
      }},
    ],
    layout: (() => {
      if (typeof cytoscapeFcose !== 'undefined') {
        return { name: 'fcose', quality: 'proof', nodeRepulsion: 4500, idealEdgeLength: 100, animate: true, animationDuration: 1000, padding: 48, randomize: false };
      }
      return { name: 'cose', animate: true, animationDuration: 600, nodeRepulsion: 10000, idealEdgeLength: 130, gravity: 0.2, numIter: 600, padding: 48 };
    })(),
    wheelSensitivity: 0.25,
    minZoom: 0.2,
    maxZoom: 3,
  });

  // Tooltip
  const tooltip = document.getElementById('cy-tooltip');
  _cy.on('mouseover', 'node', evt => {
    const n = evt.target.data();
    const pct = n.confidence ? Math.round(n.confidence * 100) + '%' : '—';
    tooltip.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span style="width:12px;height:12px;border-radius:50%;background:${esc(n.color)};flex-shrink:0"></span>
        <span style="font-weight:700;font-size:13px;color:var(--text)">${esc(n.fullLabel)}</span>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px">
        <span style="background:${esc(n.color)}22;color:${esc(n.color)};padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600">${esc(n.dim)}</span>
        ${n.decision_type ? `<span style="background:var(--bg-surface);color:var(--text-muted);padding:2px 8px;border-radius:10px;font-size:10px">${esc(n.decision_type)}</span>` : ''}
        <span style="background:var(--bg-surface);color:var(--text-muted);padding:2px 8px;border-radius:10px;font-size:10px">confidence ${pct}</span>
      </div>
      ${n.isSuperseded ? '<div style="color:#ef4444;font-size:11px;margin-bottom:4px">⊘ Superseded</div>' : ''}
      ${n.content ? `<div style="color:var(--text-muted);font-size:11px;border-top:1px solid var(--border);padding-top:8px;line-height:1.5">${esc(n.content.slice(0, 140))}${n.content.length > 140 ? '…' : ''}</div>` : ''}
      <div style="margin-top:6px;color:var(--text-dim);font-size:10px">Click to view full details</div>
    `;
    tooltip.style.display = 'block';
  });
  _cy.on('mousemove', 'node', evt => {
    const p = evt.originalEvent;
    tooltip.style.left = (p.clientX + 18) + 'px';
    tooltip.style.top  = Math.max(8, p.clientY - 20) + 'px';
  });
  _cy.on('mouseout', 'node', () => { tooltip.style.display = 'none'; });
  _cy.on('tap', 'node', evt => { tooltip.style.display = 'none'; showDecisionModal(evt.target.data('id')); });
  _cy.on('tap', function(evt) { if (evt.target === _cy) tooltip.style.display = 'none'; });

  // Legend
  const dims = [...new Set(data.nodes.map(n => (n.data.dimensions || [])[0] || 'other'))];
  const edgeTypesPresent = [...new Set(data.edges.map(e => e.data.type))];
  let leg = '<div style="font-weight:700;margin-bottom:8px;font-size:10px;text-transform:uppercase;letter-spacing:0.5px">Dimensions</div>';
  dims.forEach(d => {
    const c = GRAPH_DIM_COLORS[d] || '#818CF8';

  const edgeMeta = {
    SUPERSEDES: { color:'#ef4444', dash:false, label:'supersedes' },
    CONTRADICTION: { color:'#ef4444', dash:true, label:'contradiction' },
    TENSION: { color:'#f59e0b', dash:true, label:'tension' },
    SHARED_DIMENSION: { color:'#6b7280', dash:true, label:'shared dim' },
  };
  edgeTypesPresent.forEach(t => {
    const m = edgeMeta[t]; if (!m) return;

      <span style="width:20px;height:2px;background:${m.color};flex-shrink:0;${m.dash ? 'border-top:2px dashed '+m.color+';background:none' : ''}"></span>

  document.getElementById('cy-legend').innerHTML = leg;
}

function renderSwimlane(data) {
  const wrapper = document.getElementById('ledger-wrapper');
  const nodeById = {};
  data.nodes.forEach(n => { nodeById[n.data.id] = n.data; });
  const supersedes = {};
  const supersededBy = {};
  data.edges.forEach(e => {
    if (e.data.type === 'SUPERSEDES') {
      if (!supersedes[e.data.source]) supersedes[e.data.source] = [];
      supersedes[e.data.source].push(e.data.target);
      supersededBy[e.data.target] = e.data.source;
    }
  });
  const lanes = {};
  data.nodes.forEach(n => {
    const dim = (n.data.dimensions || [])[0] || 'other';
    if (!lanes[dim]) lanes[dim] = [];
    lanes[dim].push(n.data);
  });
  const dimOrder = ['database','api-style','api_style','testing','auth','security','caching','deployment',
    'concurrency','logging','error-handling','error_handling','state-management','state_management','messaging','other'];
  const orderedDims = [...new Set([...dimOrder.filter(d => lanes[d]), ...Object.keys(lanes)])];
  let html = '<div class="swimlane-wrap">';
  orderedDims.forEach(dim => {
    if (!lanes[dim]) return;
    const color = GRAPH_DIM_COLORS[dim] || '#818CF8';
    const dimLabel = dim.replace(/_/g, ' ');
    const ordered = [...lanes[dim]].sort((a, b) => (supersedes[b.id] ? 1 : 0) - (supersedes[a.id] ? 1 : 0));
    let nodesHtml = '';
    ordered.forEach(n => {
      const isSuperseded = !!supersededBy[n.id];
      const label = (n.label || n.title || n.id || '').slice(0, 36);
      nodesHtml += `<span class="swim-node" onclick="showDecisionModal('${esc(n.id)}')"
        style="background:${color}18;border-color:${color}66;color:var(--text);opacity:${isSuperseded ? '0.4' : '1'};${isSuperseded ? 'text-decoration:line-through' : ''}"
        title="${esc(n.label || n.id)}">
        <span class="node-dot" style="background:${color}"></span>${esc(label)}
      </span>`;
      if (supersedes[n.id]) {
        supersedes[n.id].forEach(tid => {
          const tgt = nodeById[tid];
          if (tgt && (tgt.dimensions || [])[0] === dim) {
            nodesHtml += `<span class="swim-edge-supersedes" title="supersedes ${esc(tgt.label || tid)}"></span>`;
          }
        });
      }
    });
    html += `<div class="swimlane-row">
      <div class="swimlane-label"><span style="color:${color}">${esc(dimLabel)}</span></div>
      <div class="swimlane-lane">${nodesHtml}</div>
    </div>`;
  });
  html += '</div>';
  wrapper.innerHTML = html;
}

function renderGovAssumptionList(assumptions) {
  const el = document.getElementById('gov-assumption-list');
  if (!assumptions || !assumptions.length) { el.innerHTML = '<div class="card" style="color:var(--text-dim)">No assumptions match filters. Run <code>vt assumptions --scan</code>.</div>'; return; }
  // Sort by severity: critical > high > medium > low
  const sevOrder = { critical: 0, high: 1, medium: 2, low: 3 };
  assumptions.sort((a, b) => (sevOrder[a.severity] || 3) - (sevOrder[b.severity] || 3));
  el.innerHTML = assumptions.map(a => {
    const evidence = a.code_evidence && a.code_evidence.length ? a.code_evidence[0] : null;
    const isResolved = a.status === 'validated' || a.status === 'rejected' || a.status === 'deferred';
    // Label each option: A=validated, last=deferred if "context", rest=rejected
    const optionLabels = (a.options || []).map((opt, i) => {
      if (i === 0) return 'A';
      const alpha = String.fromCharCode(65 + i); // B, C, D, E…
      return alpha;
    });
    const options = (a.options || []).map((opt, i) => {
      const sel = a.selected_option === i ? 'selected' : '';
      const label = optionLabels[i];
      const disabled = isResolved ? 'style="pointer-events:none;opacity:0.6"' : '';
      return `<div class="option ${sel}" onclick="resolveAssumption('${a.id}', ${i})" ${disabled}><strong>${label}.</strong> ${esc(opt)}</div>`;
    }).join('');
    const resolvedNote = isResolved
      ? `<div style="font-size:11px;margin-top:6px;color:${a.status==='validated'?'var(--green)':a.status==='rejected'?'var(--red)':'var(--amber)'}">
           ${a.status === 'validated' ? '✓ Validated — architectural rule confirmed' :
             a.status === 'rejected'  ? '✗ Rejected — assumption dismissed' :
             '⏸ Deferred — will resurface in 7 days'}
           ${a.resolved_by ? ` · by ${esc(a.resolved_by)}` : ''}
         </div>`
      : '';
    return `<div class="assumption-card" id="assumption-${a.id}">
      <div class="header">
        ${statusBadge(a.status)} ${severityBadge(a.severity)}
        <span style="font-size:11px;color:var(--text-dim)">${esc(a.category)} / ${esc(a.pattern_id)}</span>
        <span style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--text-dim)">${Math.round((a.confidence||0)*100)}%</span>
      </div>
      <div style="font-weight:600;margin-bottom:6px">${esc(a.summary)}</div>
      ${a.question ? `<div class="question-box"><div style="font-weight:600;margin-bottom:6px">${esc(a.question)}</div>${options}</div>` : ''}
      ${resolvedNote}
      ${evidence ? `<div style="font-size:11px;color:var(--text-dim);margin-top:4px">${esc(evidence.file)}:${evidence.line}</div>` : ''}
      ${evidence && evidence.snippet ? `<div class="evidence">${esc(evidence.snippet)}</div>` : ''}
      ${a.detected_by ? `<div style="font-size:10px;color:var(--text-dim);margin-top:4px">detected by ${esc(a.detected_by)}</div>` : ''}
    </div>`;
  }).join('');
}

async function resolveAssumption(id, optionIdx) {
  // Optimistic UI: disable the card immediately
  const card = document.getElementById('assumption-' + id);
  if (card) card.style.opacity = '0.6';
  try {
    const resp = await fetch(API + '/api/assumptions/' + id + '/resolve', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ selected_option: optionIdx, resolved_by: 'dashboard-user', rationale: '' })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      console.error('resolve failed:', err);
      if (card) card.style.opacity = '';
      return;
    }
    // Refresh the full list + stat cards to show updated counts
    await filterGovAssumptions();
  } catch(e) {
    console.error(e);
    if (card) card.style.opacity = '';
  }
}

async function triggerAssumptionScan() {
  try {
    await fetch(API + '/api/assumptions/scan', { method: 'POST' });
    filterGovAssumptions();
  } catch(e) { console.error(e); }
}

/* --- Governance: Audit Trail --- */
// ── Icons: diamond=decision, triangle=contradiction, bulb=assumption,
//           shield=hook, terminal=cli/session, bubble=llm
const AUDIT_TYPE_META = {
  decision_added:           { color: 'var(--indigo)', icon: '◆' },
  decision_superseded:      { color: 'var(--amber)',  icon: '◇' },
  contradiction_detected:   { color: 'var(--red)',    icon: '⚠' },
  contradiction_resolved:   { color: 'var(--green)',  icon: '✓' },
  context_injection:        { color: 'var(--indigo)', icon: '💬' },
  session_started:          { color: 'var(--cyan)',   icon: '▶' },
  session_completed:        { color: 'var(--cyan)',   icon: '▶' },
  assumption_detected:      { color: 'var(--amber)',  icon: '💡' },
  assumption_validated:     { color: 'var(--green)',  icon: '💡' },
  assumption_rejected:      { color: 'var(--red)',    icon: '💡' },
  assumption_scan:          { color: 'var(--amber)',  icon: '💡' },
  hook_edit:                { color: 'var(--text-dim)', icon: '🛡' },
  hook_write:               { color: 'var(--text-dim)', icon: '🛡' },
  hook_bash:                { color: 'var(--amber)',  icon: '🛡' },
  hook_read:                { color: 'var(--text-dim)', icon: '🛡' },
  llm_call:                 { color: 'var(--indigo)', icon: '💬' },
};
// Fallback by prefix
function auditMeta(event_type) {
  if (AUDIT_TYPE_META[event_type]) return AUDIT_TYPE_META[event_type];
  if (event_type.startsWith('decision'))     return { color: 'var(--indigo)', icon: '◆' };
  if (event_type.startsWith('contradiction'))return { color: 'var(--red)',    icon: '⚠' };
  if (event_type.startsWith('assumption'))   return { color: 'var(--amber)',  icon: '💡' };
  if (event_type.startsWith('hook'))         return { color: 'var(--text-dim)', icon: '🛡' };
  if (event_type.startsWith('session'))      return { color: 'var(--cyan)',   icon: '▶' };
  if (event_type === 'llm_call')             return { color: 'var(--indigo)', icon: '💬' };
  return { color: 'var(--text-dim)', icon: '·' };
}

// Result badge map
const AUDIT_RESULT_DESC = {
  pass:    '<span class="badge success"    style="font-size:10px">pass</span>',
  fail:    '<span class="badge critical"   style="font-size:10px">fail</span>',
  warning: '<span class="badge warning"    style="font-size:10px">warn</span>',
  info:    '<span class="badge neutral"    style="font-size:10px">info</span>',
};

// Source label
const AUDIT_SOURCE_LABEL = {
  decisions:      'decisions',
  contradictions: 'contrad.',
  assumptions:    'assumpt.',
  traces:         'traces',
  audit_db:       'audit.db',
};

async function loadGovAudit() {
  const el = document.getElementById('gov-content');
  el.innerHTML = `<div class="page-title">Audit Trail</div>
    <div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <input class="filter-input" style="max-width:240px" placeholder="Search events, actors, descriptions…" id="audit-search" oninput="filterAudit()">
      <select class="filter-select" style="width:auto" id="audit-source" onchange="filterAudit()">
        <option value="">All sources</option>
        <option value="decisions">Decisions</option>
        <option value="contradictions">Contradictions</option>
        <option value="assumptions">Assumptions</option>
        <option value="traces">Traces (events.jsonl)</option>
        <option value="audit_db">Merkle (audit.db)</option>
      </select>
      <select class="filter-select" style="width:auto" id="audit-result" onchange="filterAudit()">
        <option value="">All results</option>
        <option value="pass">Pass</option>
        <option value="warning">Warning</option>
        <option value="fail">Fail</option>
        <option value="info">Info</option>
      </select>
      <button class="btn" onclick="verifyAudit()">Verify Merkle</button>
      <button class="btn" onclick="downloadAuditCSV()" style="margin-left:auto">↓ CSV</button>
    </div>
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px" id="audit-count"></div>
    <div class="table-wrap" id="audit-list"></div>`;
  try {
    const data = await fetch(API + '/api/audit?limit=1000').then(r => r.json());
    window._auditData = data.entries || [];
    const src = data.sources || {};
    const parts = [];
    if (src.decisions)     parts.push(`${src.decisions} decisions`);
    if (src.contradictions)parts.push(`${src.contradictions} contradictions`);
    if (src.assumptions)   parts.push(`${src.assumptions} assumptions`);
    if (src.traces)        parts.push(`${src.traces} trace events`);
    if (src.audit_db)      parts.push(`${src.audit_db} audit.db`);
    document.getElementById('audit-count').textContent =
      `${window._auditData.length} total events — ${parts.join(' · ')}`;
    renderAuditEntries(window._auditData);
  } catch(e) { el.innerHTML += `<p style="color:var(--red)">Failed to load audit trail: ${esc(e.message)}</p>`; }
}

function filterAudit() {
  const q   = (document.getElementById('audit-search')?.value  || '').toLowerCase();
  const src = (document.getElementById('audit-source')?.value  || '');
  const res = (document.getElementById('audit-result')?.value  || '');
  const filtered = (window._auditData || []).filter(e => {
    if (src && e.source !== src) return false;
    if (res && e.result !== res) return false;
    if (q) {
      const hay = [e.label, e.description, e.actor, e.event_type, e.source].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  renderAuditEntries(filtered);
}

async function verifyAudit() {
  try {
    const data = await fetch(API + '/api/audit?limit=1000&verify=true').then(r => r.json());
    window._auditData = data.entries || [];
    renderAuditEntries(window._auditData);
  } catch(e) { console.error(e); }
}

function downloadAuditCSV() {
  const entries = window._auditData || [];
  if (!entries.length) return;
  const cols = ['timestamp','event_type','label','description','actor','result','source'];
  const esc_csv = v => `"${String(v||'').replace(/"/g,'""')}"`;
  const rows = [cols.join(',')].concat(entries.map(e => cols.map(c => esc_csv(e[c])).join(',')));
  const blob = new Blob([rows.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `vt-audit-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function renderAuditEntries(entries) {
  const el = document.getElementById('audit-list');
  if (!entries || !entries.length) {
    el.innerHTML = '<div style="padding:20px 16px;color:var(--text-dim);font-size:13px">No audit entries found.</div>';
    return;
  }
  const header = `<div style="display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--bg-surface);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);border-bottom:1px solid var(--border)">
    <span style="min-width:28px"></span>
    <span style="min-width:138px">Timestamp</span>
    <span style="min-width:172px">Action</span>
    <span style="flex:1">Description</span>
    <span style="min-width:100px">Actor</span>
    <span style="min-width:58px">Result</span>
    <span style="min-width:56px">Source</span>
  </div>`;
  const rows = entries.map(e => {
    const meta = auditMeta(e.event_type);
    const srcLabel = AUDIT_SOURCE_LABEL[e.source] || e.source || '';
    const verifiedIcon = e.verified === true
      ? ' <span title="Merkle verified" style="color:var(--green);font-size:10px">⊕</span>'
      : e.verified === false
        ? ' <span title="Verification failed" style="color:var(--red);font-size:10px">⊗</span>'
        : '';
    const rowBg = e.result === 'warning' ? 'rgba(217,119,6,0.04)'
                : e.result === 'fail'    ? 'rgba(220,38,38,0.04)'
                : e.event_type.startsWith('decision') ? 'rgba(109,40,217,0.03)'
                : 'transparent';
    return `<div class="audit-entry" style="background:${rowBg}">
      <span style="min-width:28px;font-size:15px;text-align:center;color:${meta.color};flex-shrink:0">${meta.icon}</span>
      <span class="audit-time" style="min-width:138px">${fmtDate(e.timestamp)}&nbsp;${fmtTime(e.timestamp)}</span>
      <span class="audit-type" style="min-width:172px;color:${meta.color}">${esc(e.label || e.event_type)}</span>
      <span style="flex:1;font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(e.description||'')}">${esc(e.description||'—')}</span>
      <span style="min-width:100px;font-size:11px;font-family:var(--mono);color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(e.actor||'—')}</span>
      <span style="min-width:58px">${AUDIT_RESULT_DESC[e.result]||''}</span>
      <span style="min-width:56px;font-size:9px;font-family:var(--mono);color:var(--text-dim)">${esc(srcLabel)}${verifiedIcon}</span>
    </div>`;
  }).join('');
  el.innerHTML = header + rows;
}
