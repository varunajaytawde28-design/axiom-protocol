/* ===================================================================
   COMMAND PALETTE (Cmd+K)
   =================================================================== */
const cmdCommands = [
  { prefix: '>', label: 'Go to Home', icon: '&#9632;', action: () => navTo('home') },
  { prefix: '>', label: 'Go to Lattice', icon: '&#9670;', action: () => navTo('lattice') },
  { prefix: '>', label: 'Go to Axiom', icon: '&#9830;', action: () => navTo('axiom') },
  { prefix: '>', label: 'Go to Alignment', icon: '&#9733;', action: () => navTo('alignment') },
  { prefix: '>', label: 'Go to Governance', icon: '&#9881;', action: () => navTo('governance') },
  { prefix: '>', label: 'Resolve Contradictions', icon: '&#9888;', action: () => { navTo('axiom'); } },
  { prefix: '>', label: 'Onboard Agent', icon: '&#9881;', action: () => { navTo('governance'); setTimeout(() => switchGovTab(document.querySelector('[data-gov="agents"]'),'agents'), 100); } },
  { prefix: '>', label: 'Export SOC2 Evidence', icon: '&#9875;', action: () => exportEvidence() },
  { prefix: '>', label: 'Toggle Dark Mode', icon: '&#9789;', action: () => toggleTheme() },
  { prefix: '>', label: 'Toggle High Density', icon: '&#8596;', action: () => document.body.classList.toggle('high-density') },
  { prefix: '>', label: 'Refresh Data', icon: '&#8635;', action: () => loadWorkspace(currentWorkspace) },
  { prefix: '>', label: 'View Assumptions', icon: '&#10067;', action: () => { navTo('governance'); setTimeout(() => switchGovTab(document.querySelector('[data-gov="assumptions"]'),'assumptions'), 100); } },
  { prefix: '>', label: 'View Audit Trail', icon: '&#9875;', action: () => { navTo('governance'); setTimeout(() => switchGovTab(document.querySelector('[data-gov="audit"]'),'audit'), 100); } },
  { prefix: '>', label: 'View Compliance', icon: '&#9745;', action: () => { navTo('governance'); setTimeout(() => switchGovTab(document.querySelector('[data-gov="compliance"]'),'compliance'), 100); } },
];

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') { e.preventDefault(); toggleCmdPalette(); }
  if (e.key === 'Escape') closeCmdPalette();
});

function toggleCmdPalette() {
  const overlay = document.getElementById('cmd-overlay');
  overlay.classList.toggle('open');
  if (overlay.classList.contains('open')) {
    const input = document.getElementById('cmd-input');
    input.value = ''; input.focus();
    filterCmdPalette('');
  }
}
function closeCmdPalette() { document.getElementById('cmd-overlay').classList.remove('open'); }

document.getElementById('cmd-input').addEventListener('input', e => filterCmdPalette(e.target.value));
document.getElementById('cmd-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const sel = document.querySelector('.cmd-item.selected') || document.querySelector('.cmd-item');
    if (sel) sel.click();
  }
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    const items = [...document.querySelectorAll('.cmd-item')];
    const idx = items.findIndex(i => i.classList.contains('selected'));
    items.forEach(i => i.classList.remove('selected'));
    const next = e.key === 'ArrowDown' ? Math.min(idx + 1, items.length - 1) : Math.max(idx - 1, 0);
    if (items[next]) { items[next].classList.add('selected'); items[next].scrollIntoView({ block: 'nearest' }); }
  }
});
document.getElementById('cmd-overlay').addEventListener('click', e => { if (e.target.id === 'cmd-overlay') closeCmdPalette(); });

function filterCmdPalette(query) {
  const q = query.toLowerCase().trim();
  const results = document.getElementById('cmd-results');
  let items = [];

  if (q.startsWith('>') || !q.startsWith('@') && !q.startsWith('#') && !q.startsWith('?')) {
    // Command mode
    const search = q.startsWith('>') ? q.slice(1).trim() : q;
    items = cmdCommands.filter(c => c.label.toLowerCase().includes(search));
  } else if (q.startsWith('@')) {
    // Agent targeting
    const search = q.slice(1).trim();
    items = [
      { label: '@claude-backend', icon: '&#9881;', action: () => { closeCmdPalette(); navTo('lattice'); setTimeout(() => { const sel = document.getElementById('lf-agent'); if(sel) { sel.value='claude-backend'; applyLatticeFilters(); }}, 200); } },
      { label: '@cursor-frontend', icon: '&#9881;', action: () => { closeCmdPalette(); navTo('lattice'); setTimeout(() => { const sel = document.getElementById('lf-agent'); if(sel) { sel.value='cursor-frontend'; applyLatticeFilters(); }}, 200); } },
    ].filter(c => c.label.toLowerCase().includes(search));
  } else if (q.startsWith('#')) {
    // Search mode
    items = [{ label: 'Search: ' + q.slice(1), icon: '&#128270;', action: () => { closeCmdPalette(); navTo('lattice'); setTimeout(() => { const inp = document.getElementById('lf-search'); if(inp) { inp.value = q.slice(1); applyLatticeFilters(); }}, 200); } }];
  } else if (q.startsWith('?')) {
    // Help mode
    items = [
      { label: 'Lyapunov drift measures agent trajectory divergence from expected behavior', icon: '?', action: () => closeCmdPalette() },
      { label: 'NLI score is the Natural Language Inference confidence of a contradiction', icon: '?', action: () => closeCmdPalette() },
      { label: 'Coherence = 1 - (actionable_contradictions / total_decisions)', icon: '?', action: () => closeCmdPalette() },
    ].filter(c => c.label.toLowerCase().includes(q.slice(1).trim()));
  }

  if (!items.length) {
    results.innerHTML = '<div style="padding:16px;color:var(--text-dim);text-align:center">No results</div>';
    return;
  }
  results.innerHTML = items.map((c, i) => `
    <div class="cmd-item${i === 0 ? ' selected' : ''}" onclick="(function(){${c.action.toString().slice(c.action.toString().indexOf('{') + 1, -1)}})();closeCmdPalette()">
      <span class="cmd-label"><span class="cmd-icon">${c.icon || ''}</span> ${esc(c.label)}</span>
    </div>
  `).join('');
}

/* ===================================================================
   WEBSOCKET
   =================================================================== */
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(proto + '://' + location.host + '/ws');
  ws.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'contradiction_resolved' || msg.type === 'decision_added') {
        loadWorkspace(currentWorkspace);
      }
    } catch {}
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => {};
}

/* ===================================================================
   THEME TOGGLE
   =================================================================== */
function toggleTheme() {
  const isDark = document.body.classList.contains('dark');
  const next = isDark ? 'light' : 'dark';
  document.body.classList.remove('light', 'dark');
  document.body.classList.add(next);
  localStorage.setItem('vt-theme', next);
  updateThemeIcon();
}

function updateThemeIcon() {
  const btn = document.getElementById('theme-toggle');
  if (!btn) return;
  btn.innerHTML = document.body.classList.contains('dark') ? '\u263E' : '\u2600';
  btn.title = document.body.classList.contains('dark') ? 'Switch to light mode' : 'Switch to dark mode';
}
updateThemeIcon();

/* ===================================================================
   PERSONA-BASED ROUTING (on init)
   =================================================================== */
async function initDashboard() {
  // Try to load persona config
  let landing = 'home';
  try {
    const persona = localStorage.getItem('vt-persona');
    if (persona) {
      const routing = {
        'tech-lead': 'home', 'ciso': 'governance', 'pm': 'alignment', 'qa': 'alignment'
      };
      landing = routing[persona] || 'home';
    } else {
      const data = await fetch(API + '/api/persona').then(r => r.json()).catch(() => null);
      if (data && data.routing) {
        landing = data.routing.landing || 'home';
        localStorage.setItem('vt-persona', data.persona);
      }
    }
  } catch {}
  navTo(landing);
  try { connectWS(); } catch {}

  // Update contradiction badge (Bug 6 fix — always refresh on init)
  updateBadges();
}

initDashboard();
